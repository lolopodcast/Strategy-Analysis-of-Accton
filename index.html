      modal.className = 'copyright-modal';
      modal.innerText = 'Intellectual Property of Prof. Shihmin Lo';
      document.body.appendChild(modal);

    modal.style.animation = 'none';
    modal.offsetHeight; 
    modal.style.animation = 'popIn 0.3s ease-out forwards';
    modal.style.opacity = '1';
    
    if(window.copyrightTimer) clearTimeout(window.copyrightTimer);
    window.copyrightTimer = setTimeout(() => {
      let currentModal = document.getElementById('copyright-msg-modal');
      if(currentModal) {
        currentModal.style.animation = 'none'; 
        currentModal.style.opacity = '0';      
        setTimeout(() => { if (currentModal.parentNode) currentModal.parentNode.removeChild(currentModal); }, 300);

  document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('dragstart', (e) => {
      if (e.target.tagName.toLowerCase() === 'img' || e.target.tagName.toLowerCase() === 'svg') e.preventDefault();
    });
    document.addEventListener('contextmenu', (e) => {
      const selection = window.getSelection().toString();

        e.preventDefault(); showCopyrightMsg();
      }
    });

      if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase())) { e.preventDefault(); showCopyrightMsg(); }
    });

m1_nav:"1. 破壞與解構",m1_title:"破壞性創新與產業解構 (Disruptive Innovation & Disaggregation)",
m1_p1:"傳統網通產業由 Cisco（思科）等巨頭壟斷。它們提供「軟硬體高度整合 (Tightly Coupled)」的封閉系統，客戶買了硬體就必須買昂貴的專屬軟體，被深深套牢 (Lock-in)。這是一種典型追求高毛利的「維持性創新」模式。",
m1_p2:"「當產品性能超越了主流客戶的吸收能力時，就是破壞性創新切入的絕佳時機。」—— Clayton Christensen",
m1_p3:"隨著雲端運算崛起，超大型資料中心 (Hyperscalers 像是 Meta、Amazon、Google) 需要海量且極致標準化的網路設備。他們不想要傳統大廠昂貴且充滿多餘功能的封閉系統。智邦敏銳地察覺到這個從低階市場崛起的「破壞性創新 (Disruptive Innovation)」機會，大力推動「白牌交換器 (White-box switches)」。",
m1_p4:"白牌模式的核心在於「軟硬體解構 (Disaggregation)」。智邦專注於提供高效能、標準化的高階硬體裸機，讓雲端巨頭可以自由安裝開源的網路作業系統 (Network OS)。這種架構創新大幅降低了客戶的總體擁有成本 (TCO)，成功顛覆了傳統網通巨頭的霸權。",
m1_cards:[
  {title:"封閉式架構的痛點",desc:"傳統 Cisco 交換器像是一台綁定 iOS 的 iPhone，軟硬體不可分割且極度昂貴。對於需要採購數萬台設備的雲端資料中心而言，這種高溢價與無法客製化的封閉系統是巨大的負擔。"},
  {title:"白牌交換器 (White-box)",desc:"智邦提供的白牌交換器，就像是買一台沒有安裝作業系統的空白 PC。客戶可以根據自身資料中心的需求，自由安裝 SDN (軟體定義網路) 軟體，徹底擺脫單一廠商的套牢。"},
  {title:"破壞性創新軌跡",desc:"白牌交換器初期可能缺乏傳統大廠的完整企業級軟體服務（初期性能劣勢），但因為其「開放、便宜、高度彈性」的新價值主張，迅速被超大型雲端巨頭採用，最終反攻主流市場。"},
  {title:"垂直解構 (Vertical Disaggregation)",desc:"智邦推動的軟硬體分離，導致原本由單一廠商垂直整合的網通價值鏈發生「解構」，演變成硬體製造商與軟體開發商專業分工的新產業生態。"}
],
m1_terms:[
  {front:"Disaggregation\n軟硬體解構",back:"將傳統綁定在一起的硬體與軟體分開，讓客戶能分別向不同廠商採購標準化硬體與開源軟體，打破原有的封閉生態。"},
  {front:"White-box Switches\n白牌交換器",back:"無品牌或以製造商品牌銷售的高階標準化網路硬體，未預載專屬作業系統，提供極大的客製化彈性與成本優勢。"},
  {front:"Disruptive Innovation\n破壞性創新",back:"從低階或新市場切入，初期性能較差但具備便宜、簡單等新屬性，最終隨著技術進步顛覆既有主流市場的創新模式。"}
],
m1_q:[
  {q:"傳統網通巨頭（如 Cisco）的商業模式具有何種特徵？",opts:["提供無作業系統的裸機硬體","軟硬體高度整合的封閉系統，藉以賺取高額毛利並套牢客戶","將所有研發技術開源","完全外包所有硬體與軟體"],ans:1,exp:"傳統大廠透過專屬規格將硬體與軟體綁定，客戶若要擴充設備只能繼續採購該品牌的產品，形成強大的 Lock-in 效應。"},
  {q:"智邦推動的「白牌交換器」(White-box switches) 對超大型資料中心 (Hyperscalers) 的最大吸引力為何？",opts:["擁有最華麗的品牌標誌","附帶極其昂貴的專屬軟體授權","打破軟硬體綁定，允許客戶安裝開源軟體，大幅降低總擁有成本 (TCO) 並提升客製彈性","免費贈送"],ans:2,exp:"白牌設備讓雲端巨頭能像組裝 PC 一樣，只買硬體，然後灌入自己開發或開源的網路系統，擺脫傳統大廠的控制。"},
  {q:"將網路設備的硬體製造與作業系統軟體分開，由不同廠商提供的現象，在策略管理中稱為？",opts:["垂直整合 (Vertical Integration)","垂直解構 (Vertical Disaggregation / Decoupling)","非相關多角化","水平併購"],ans:1,exp:"軟硬體解構打破了過去一家公司包辦全部的垂直整合模式，讓價值鏈走向專業化分工。"},
  {q:"根據 Christensen 的破壞性創新理論，白牌交換器初期能在雲端資料中心市場站穩腳跟的原因是？",opts:["因為其企業級軟體功能遠勝 Cisco","因為雲端巨頭需要更便宜、標準化且具備高度彈性的基礎設施，而非傳統大廠性能過剩的封閉系統","因為白牌交換器的價格最高","因為政府強制規定"],ans:1,exp:"破壞性創新往往用「夠用就好」且更便宜、更彈性的方案，精準打中那些對傳統昂貴系統感到「過度服務」的客戶。"},
  {q:"智邦在白牌交換器市場的成功，大幅削弱了傳統大廠的哪一種競爭優勢？",opts:["製造效率","轉換成本 (Switching Costs) 所帶來的客戶鎖定 (Lock-in)","品牌知名度","員工福利"],ans:1,exp:"白牌模式推動了開放標準，降低了客戶更換硬體供應商的轉換成本，徹底瓦解了傳統廠商的鎖定優勢。"}
],

m2_nav:"2. 開放網路",m2_title:"開放網路與商業模式創新 (Open Networking)",
m2_p1:"智邦的成功不僅在於硬體製造，更在於其深刻理解並擁抱了「開放網路 (Open Networking)」的生態系思維。這是一種強大的商業模式創新 (Business Model Innovation)。",
m2_p2:"超大型資料中心如 Meta (Facebook) 為了打破傳統硬體商的壟斷，發起了 OCP (Open Compute Project，開放運算計畫)。OCP 旨在將資料中心的硬體設計開源，任何人都可以使用這些設計藍圖來製造設備。智邦是全球第一家將高階交換器設計貢獻給 OCP 的網通廠。",
m2_p3:"將辛苦研發的設計圖「開源 (Open Source)」看似違反常理，但從策略管理的角度來看，智邦是在創造強大的「網路外部性 (Network Externalities)」。透過 OCP，智邦的規格成為了業界的「主導設計 (Dominant Design)」。",
m2_p4:"當智邦的硬體規格成為開源標準，全球的軟體開發商就會針對智邦的硬體開發軟體，這引發了強烈的「跨邊網路效應」。智邦不僅賺取了龐大的硬體製造利潤，更藉由開放標準，將自己的商業模式從單純的代工，升級為開放網路生態系的核心參與者。",
m2_cards:[
  {title:"商業模式創新",desc:"智邦放棄了傳統硬體廠「藏私」的習慣，轉而以「開放共享」作為商業模式。透過開源，降低了整體產業的進入門檻，將市場大餅急速做大。"},
  {title:"OCP 開放運算計畫",desc:"由 Meta 主導的開源硬體計畫。智邦積極參與並貢獻技術，使其硬體規格成為雲端產業的標準，獲得了 Meta 乃至全球資料中心的信任與龐大訂單。"},
  {title:"確立主導設計",desc:"在標準戰役中，擁有最大「安裝基礎 (Installed Base)」的規格往往能贏得市場。智邦透過 OCP 讓自己的架構廣為流傳，成功將其確立為主導設計。"},
  {title:"跨邊網路效應",desc:"硬體的開源吸引了大量的 SDN (軟體定義網路) 軟體新創投入開發；豐富的軟體生態又吸引了更多的終端客戶購買智邦的硬體，形成贏家通吃。"}
],
m2_terms:[
  {front:"Business Model Innovation\n商業模式創新",back:"企業改變創造、傳遞與獲取價值的方式。智邦從封閉代工轉向參與開源硬體生態系，即是經典案例。"},
  {front:"Dominant Design\n主導設計",back:"在產業演化過程中，獲得市場廣泛接受並成為業界標準的產品架構。智邦透過 OCP 確立了其在白牌市場的主導設計。"},
  {front:"Open Compute Project (OCP)\n開放運算計畫",back:"由超大型資料中心發起，旨在將資料中心硬體（伺服器、儲存、網路）設計開源的計畫，智邦是其關鍵推手。"}
],
m2_q:[
  {q:"智邦將其高階交換器設計圖無償貢獻給 OCP (開放運算計畫)，此舉在策略上的主要目的是什麼？",opts:["為了放棄硬體市場","為了推動其架構廣泛被採用，藉以確立產業的「主導設計 (Dominant Design)」並做大市場","因為設計圖有瑕疵","被駭客竊取"],ans:1,exp:"在具有網路效應的市場中，將技術開放能快速擴大安裝基礎，使自己的規格成為業界共通標準，從而在後續的製造訂單中獲取龐大利潤。"},
  {q:"「開放網路」(Open Networking) 生態系如何產生「跨邊網路效應」(Cross-side Network Effects)？",opts:["硬體越封閉，買的人越多","智邦的開放硬體吸引了大量開源軟體開發商加入，豐富的軟體生態反過來吸引更多客戶購買智邦硬體","網路速度越快，員工越開心","政府管制越多，利潤越高"],ans:1,exp:"這就像智慧型手機平台，硬體（如 Android 陣營）與軟體開發者之間會產生互相吸引的正向回饋循環。"},
  {q:"在 OCP 生態系中，超大型資料中心 (Hyperscalers) 如 Meta 發起開源硬體的根本動機為何？",opts:["為了做慈善","為了徹底打破傳統網通大廠（如 Cisco）的軟硬體壟斷，降低自身的基礎設施建置成本","為了轉行做硬體製造","為了增加專利訴訟"],ans:1,exp:"雲端巨頭需要極致便宜且彈性的硬體，推動開源能讓多家製造商（如智邦）相互競爭提供硬體，從而降低巨頭的採購成本。"},
  {q:"智邦的商業模式與傳統 EMS 代工廠（如鴻海組裝 iPhone）最大的差異在於？",opts:["智邦完全不製造硬體","智邦具備強大的前端架構設計能力，且其設計能成為業界開源標準，而非僅被動接收客戶圖紙","智邦只賣軟體","智邦的產品最昂貴"],ans:1,exp:"智邦深度參與了產品的「定義與設計」階段，這使其在價值鏈上的地位遠高於單純的組裝代工廠。"},
  {q:"透過 OCP，智邦成功克服了跨國企業擴張時常遇到的哪一種困難？",opts:["資金短缺","品牌知名度不足，透過社群開源迅速獲得了全球頂尖客戶的信任與認可","語言障礙","氣候不適應"],ans:1,exp:"在 B2B 市場，參與開源社群並貢獻頂級技術，是建立技術權威與獲取雲端巨頭信任的最快途徑。"}
],

m3_nav:"3. 核心能耐與 JDM",m3_title:"核心能耐與 JDM 協同設計 (Core Competencies & JDM)",
m3_p1:"台灣科技廠過去多依賴 OEM（純代工組裝）或 ODM（貼牌設計製造）。但在白牌與雲端時代，智邦發展出了獨特的「JDM (Joint Design Manufacturing，協同設計製造)」模式。",
m3_p2:"雲端巨頭的資料中心架構極度複雜且屬高度商業機密，他們無法購買市面上的標準品，也不能將設計完全外包。智邦的 JDM 模式，是派駐頂尖研發工程師直接與 Meta、Amazon 的架構師「並肩作戰」。",
m3_p3:"這種模式需要極高的「組織能力 (Organizational Capabilities)」。智邦的核心能耐不僅是硬體製造，而是「在極短時間內，將雲端客戶前衛的概念，轉化為可量產、高良率的高階硬體產品」。這涉及極度深度的「默會知識 (Tacit Knowledge)」與跨國團隊協作。",
m3_p4:"透過 JDM，智邦與超級大客戶形成了強大的「關係資本 (Relational Capital)」。由於設計過程中投入了大量「專屬性資產 (Asset Specificity)」（如為特定客戶客製化的散熱設計與韌體整合），雙方產生了極高的相互依賴性，這成為競爭對手難以介入的強大護城河。",
m3_cards:[
  {title:"從 ODM 到 JDM",desc:"ODM 是「我設計好給你挑」；JDM 是「我們一開始就坐在一起，根據你的獨特痛點共同設計」。JDM 創造了無可取代的客戶黏著度。"},
  {title:"默會知識的轉化",desc:"與雲端巨頭共同研發的過程中，智邦累積了大量關於先進散熱、高頻訊號處理的隱性經驗，這些「做中學」的知識是無法從教科書上學到的。"},
  {title:"極致的 Time-to-Market",desc:"在科技業，速度就是利潤。智邦的 JDM 能大幅縮短從概念驗證 (POC) 到大量生產 (Mass Production) 的時間，幫助客戶搶佔市場先機。"},
  {title:"關係資本護城河",desc:"歷經多次高難度專案成功的合作，智邦與巨頭之間建立了深厚的信任。這種高強度的「關係型契約」有效降低了交易成本與套牢風險。"}
],
m3_terms:[
  {front:"Joint Design Manufacturing (JDM)\n協同設計製造",back:"製造商與客戶在產品開發極早期就緊密合作，共同定義規格並進行設計與測試的深度夥伴關係。"},
  {front:"Tacit Knowledge\n默會知識",back:"存在於工程師大腦與團隊協作默契中，難以被寫成說明書或編碼的知識，是形成核心競爭力的關鍵。"},
  {front:"Relational Capital\n關係資本",back:"企業間經過長期互動與成功合作所累積的信任與互惠關係，能有效降低交易成本並促進深層知識分享。"}
],
m3_q:[
  {q:"智邦採用的「JDM (協同設計製造)」模式，與傳統的 ODM 最大的差異為何？",opts:["JDM 完全不需要研發","JDM 強調在開發極早期就與客戶的架構師深度結合，共同探索與定義規格，而非單向提供現成設計","ODM 比較昂貴","兩者完全相同"],ans:1,exp:"JDM 是深度的雙向合作，共同解決最前沿的技術難題，創造出極強的客戶綁定效應。"},
  {q:"在 JDM 合作中，智邦與雲端巨頭共同解決高頻訊號與散熱問題，這主要為智邦累積了何種極難被對手模仿的競爭優勢？",opts:["龐大的工廠廠房","高度複雜且難以言傳的「默會知識」(Tacit Knowledge)","大量的現金","政府的免稅額"],ans:1,exp:"在高階硬體設計中，許多 debug 的 know-how 來自無數次試錯的經驗，這種默會知識無法輕易被對手用高薪挖角複製。"},
  {q:"JDM 模式使得智邦與客戶之間產生了高度的「資產專屬性」(Asset Specificity)。從交易成本經濟學的角度來看，這通常會帶來什麼風險？企業又如何克服？",opts:["套牢風險 (Hold-up)；企業透過長期累積的「關係資本」與深厚信任來克服","匯率風險；企業透過買保險克服","技術落後風險；企業透過裁員克服","沒有任何風險"],ans:0,exp:"高度客製化的合作容易導致互相套牢。智邦透過長期穩定的優異交貨紀錄，建立了強大的信任（關係型契約），取代了僵硬的法律防範。"},
  {q:"智邦的「核心能耐」(Core Competence) 最精準的描述為何？",opts:["提供全世界最便宜的勞工","將客戶極度前衛的雲端架構概念，以最快速度轉化為高良率、可量產的高階硬體解決方案的組織能力","撰寫開源軟體的能力","擁有自己的零售店面"],ans:1,exp:"智邦的價值不在於廉價製造，而在於其強大的「工程化與量產化」能力（極致的 Time-to-Market）。"},
  {q:"為什麼超大型資料中心 (Hyperscalers) 不乾脆自己建立工廠生產交換器 (垂直整合)？",opts:["因為他們討厭工廠","因為硬體製造（供應鏈管理、良率控制）並非他們的核心能力，且最適規模差異過大，外包給智邦更具效率","因為政府禁止","因為工廠會產生污染"],ans:1,exp:"雲端巨頭的核心能力是軟體與演算法。硬體製造的資本密集度高且管理極其複雜，交給專業的智邦（專業分工）是最符合經濟效益的選擇。"}
],

m4_nav:"4. 聯盟與生態",m4_title:"策略聯盟與生態系 (Strategic Alliances & Ecosystem)",
m4_p1:"在軟硬體解構的開放網路架構下，智邦只提供硬體裸機。這意味著，如果沒有優異的網路作業系統 (NOS) 搭配，智邦的硬體就只是一堆廢鐵。因此，「策略聯盟 (Strategic Alliances)」成為智邦生存與擴張的核心命脈。",
m4_p2:"智邦積極與全球頂尖的軟體公司（如 Cumulus Networks, 甚至微軟推動的 SONiC 作業系統）建立「非股權聯盟 (Non-equity Alliances)」。這種合作創造了經典的「互補性資源綜效 (Complementary Synergies)」：智邦出高階硬體，夥伴出靈活的軟體。",
m4_p3:"為什麼是聯盟而不是併購？Capron & Mitchell 指出，當企業需要的資源是「模組化」且市場技術變化極快時，併購（買）的風險太高且成本沉重。智邦與軟體廠的結合屬於清晰的「模組化綜效 (Modular Synergies)」，雙方只要對接好標準介面即可，保持獨立性反而能維持軟體廠的創新活力。",
m4_p4:"透過廣結善緣，智邦在開放網路領域建構了一個龐大的「生態系 (Ecosystem)」。這個生態系不僅降低了單一技術失敗的風險（實質選擇權 Real Options），更讓客戶在採購智邦硬體時，擁有最豐富的軟體選項，進一步強化了智邦硬體的市場價值。",
m4_cards:[
  {title:"互補性資源 (Complementary Resources)",desc:"硬體與軟體是天生的互補品。智邦的硬體製造能力與新創公司的開源軟體能力結合，為雲端客戶提供了完整且強大的解決方案。"},
  {title:"模組化綜效 (Modular Synergies)",desc:"雙方的合作不需要深度改變彼此的組織架構，只需確立標準API。這非常適合透過靈活的非股權合約聯盟來達成，避免併購的龐大整合風險。"},
  {title:"實質選擇權 (Real Options)",desc:"在技術規格尚未一統天下的混沌期，智邦與多種不同作業系統陣營皆保持聯盟關係。這等同於買了多個「選擇權」，無論未來誰勝出，智邦都能獲利。"},
  {title:"防止價值流失",desc:"若智邦試圖惡意併購一家軟體新創，極可能引發嚴重的「文化衝突」，導致軟體天才集體離職，最終買到一個空殼。聯盟是保護「軟性資源」的最佳策略。"}
],
m4_terms:[
  {front:"Strategic Alliance\n策略聯盟",back:"獨立企業間為了共同的策略目標，透過分享資源與能力所達成的合作協議。智邦廣泛運用此策略以補足軟體能力。"},
  {front:"Modular Synergies\n模組化綜效",back:"資源結合時不需要大幅度修改彼此的底層技術或組織架構。是選擇「聯盟」而非「併購」的重要考量。"},
  {front:"Ecosystem\n生態系",back:"由硬體商、軟體開發商、系統整合商與終端客戶共同組成，互相依賴、共同創造價值的商業網絡。"}
],
m4_q:[
  {q:"智邦只生產白牌交換器硬體，因此必須與網路作業系統 (NOS) 軟體商合作。這展現了策略聯盟中的哪一種核心動機？",opts:["為了裁減員工","取得高度的「互補性資源」(Complementary Resources)，以提供客戶完整的解決方案","為了壟斷市場價格","為了逃避法規"],ans:1,exp:"硬體與軟體是完美的互補品。智邦缺乏純軟體開發的基因，透過聯盟能以最低成本補足這塊缺口。"},
  {q:"為何智邦選擇與軟體公司建立「策略聯盟」，而不是直接花大錢「併購」他們？",opts:["因為智邦沒有任何資金","軟體與硬體結合屬於「模組化綜效」，不需深度組織融合；且併購軟體公司極易引發文化衝突導致核心人才流失","因為政府禁止併購","因為併購不需要管理"],ans:1,exp:"當資源只需模組化對接時，「借」(聯盟) 遠比「買」(併購) 更具彈性且風險更低。"},
  {q:"在技術標準尚未確立的開放網路早期，智邦同時支援多款不同的第三方開源軟體系統。這種策略在財務與策略管理上稱為什麼概念？",opts:["沉沒成本陷阱","實質選擇權 (Real Options) 的多方押注，保留未來彈性並降低單一技術失敗風險","贏家的詛咒","完全壟斷"],ans:1,exp:"面對高度不確定性，與多方聯盟就像買了多個保險的「買權」，讓企業不會因為單一技術陣營的潰敗而覆滅。"},
  {q:"智邦建立的開放網路生態系，對其本身的硬體銷售有何幫助？",opts:["會降低硬體的銷售量","生態系中的軟體選擇越豐富，智邦硬體的「網路外部性價值」就越高，對終端客戶的吸引力就越強","會增加硬體的製造成本","完全沒有幫助"],ans:1,exp:"如同 App Store 上的 App 越多，iPhone 越好賣。相容的開源軟體越多，智邦白牌硬體的價值就呈指數上升。"},
  {q:"智邦與軟體新創公司的合作通常屬於「非股權聯盟 (Non-equity Alliances)」。這種聯盟形式的最大特色是？",opts:["雙方必須完全合併成一家公司","關係最為鬆散且彈性最高，僅基於合約合作，隨時可依市場變化調整或終止","雙方必須互相持有 50% 股份","政府會嚴格審查"],ans:1,exp:"非股權聯盟沒有資本綁定的沉重負擔，在快速變動的科技業中，是最能維持戰術靈活性的合作方式。"}
],

m5_nav:"5. 供應鏈韌性",m5_title:"供應鏈韌性與全球佈局 (Supply Chain Resilience)",
m5_p1:"科技戰與地緣政治（如中美貿易戰、COVID-19 斷鏈危機）徹底改變了全球供應鏈的邏輯。過去，網通廠追求絕對的「尋求效率 (Efficiency-seeking)」，將產能高度集中於中國以追求極致的規模經濟。如今，這種過度集中的風險已無法承受。",
m5_p2:"品牌客戶與雲端巨頭強制要求供應商進行「去風險化 (De-risking)」與「China Plus One」策略。面對客戶的壓力，智邦必須重新思考其地理區域擴張 (Geographical Expansion) 策略。",
m5_p3:"智邦果斷進行全球佈局調整，不僅大舉擴大台灣總部的產能（生產高階 400G/800G 交換器以保護智財權並避開關稅），更積極在越南等地建廠（服務主流產品，分散地緣風險）。",
m5_p4:"從 Bartlett & Ghoshal 的 I-R 矩陣 (Integration-Responsiveness) 來看，智邦正從極度強調降成本的「全球化策略 (Global Strategy)」，被迫向右移動，增加「在地回應 (Local Responsiveness)」。在多國建立分散的生產基地，不可避免地會犧牲部分規模經濟，並增加跨國管理的「行政與文化距離 (CAGE Distance)」摩擦成本。這是為了換取「供應鏈韌性 (Resilience)」所必須支付的保險費。",
m5_cards:[
  {title:"去風險化 (De-risking)",desc:"不再將所有雞蛋放在同一個籃子裡。雖然將部分產能移出中國會導致初期生產成本上升，但能大幅降低因單一地區封城或關稅制裁而導致的斷鏈風險。"},
  {title:"CAGE 距離的挑戰",desc:"赴越南或東南亞建廠，企業必須面對截然不同的文化習慣、語言障礙與行政法規不透明等「外來者劣勢」。建立在地化管理團隊是成功關鍵。"},
  {title:"高階產品留台",desc:"智邦將最先進的 800G AI 交換器與高階研發留在台灣。這不僅是為了避開貿易戰關稅，更是為了嚴密保護核心智財權 (IP) 與默會知識不被輕易竊取。"},
  {title:"韌性 vs. 效率的權衡",desc:"供應鏈設計不再只看「成本最低」。現代策略要求在「極致效率」與「極端衝擊下的恢復力（韌性）」之間取得平衡。冗餘產能不再是浪費，而是救命資產。"}
],
m5_terms:[
  {front:"Supply Chain Resilience\n供應鏈韌性",back:"供應鏈在面臨突發的重大外部衝擊（如疫情、戰爭、貿易制裁）時，能夠維持營運或快速恢復正常狀態的能力。"},
  {front:"China Plus One",back:"跨國企業為了分散地緣政治與勞動力成本上升的風險，在保留中國業務的同時，強制要求在其他國家（如越南、印度）建立備用產能的策略。"},
  {front:"Liability of Foreignness\n外來者劣勢",back:"企業跨出母國到海外設廠時，因為不熟悉當地的文化、法律制度與基礎設施，而產生的額外摩擦成本與營運風險。"}
],
m5_q:[
  {q:"近年來智邦積極在越南擴充產能並擴大台灣生產線，這種「China Plus One」策略背後最主要的驅動力為何？",opts:["追求比中國更極致的規模經濟","因應地緣政治摩擦與關稅壁壘，客戶要求供應商必須「去風險化 (De-risking)」與提升供應鏈韌性","越南的科技研發能力世界第一","為了在越南賣更多交換器"],ans:1,exp:"中美科技戰打破了過去純粹追求最低成本的邏輯，客戶現在願意支付溢價來確保供應鏈不會因為單一國家的政治因素而斷鏈。"},
  {q:"智邦將最高階的 400G/800G AI 交換器產能留在台灣新竹/竹北，主要考量「不」包含哪一項？",opts:["規避中美貿易戰的高額關稅","就近與研發團隊緊密配合，解決初期量產的良率問題 (默會知識密集)","台灣的人工成本是全球最低的","嚴密保護高階產品的智財權 (IP) 與核心製程機密"],ans:2,exp:"台灣的人力與土地成本相對較高。高階產品留台是為了「安全、保密與緊密的研發製造協同」，而非追求最低工資。"},
  {q:"在 Bartlett & Ghoshal 的 I-R 架構中，因應各國法規與關稅壁壘而在多國分散建廠，代表企業面臨了何種壓力的提升？",opts:["全球整合壓力 (追求極致降成本)","在地回應壓力 (Local Responsiveness)","品牌行銷壓力","創新研發壓力"],ans:1,exp:"各國政府的關稅與在地製造要求，迫使跨國企業必須因應各地的特殊政治與經濟環境做出調整，這就是「在地回應」的體現。"},
  {q:"當智邦赴越南建廠時，面臨當地員工不願加班、語言不通及政府行政效率低落等問題。在 Ghemawat 的 CAGE 距離架構中，這主要反映了哪兩種距離的摩擦？",opts:["地理距離與經濟距離","文化距離與行政/政治距離","心理距離與虛擬距離","只有地理距離"],ans:1,exp:"員工價值觀與語言屬於「文化距離」；政府行政效率與法規透明度屬於「行政/政治距離」。這些都是造成外來者劣勢的主因。"},
  {q:"將產能從單一超大工廠分散到東南亞多個中型工廠，在經濟學上最直接的負面影響是什麼？",opts:["產品設計變醜","犧牲了部分「規模經濟 (Economies of Scale)」效應，導致單位製造成本上升","會增加市場行銷費用","員工會立刻全部辭職"],ans:1,exp:"分散產能意味著固定成本（如建廠、模具、管理系統）被重複投資且無法被海量訂單極致攤提，這是為了換取「韌性」所必須支付的成本。"}
],

m6_nav:"6. 雙元與轉型",m6_title:"AI 時代的雙元性轉型 (Ambidextrous Transformation)",
m6_p1:"在策略管理中，最考驗高階經營團隊的是「組織雙元性 (Organizational Ambidexterity)」：企業必須同時用右手「利用 (Exploitation)」現有核心事業榨取利潤，用左手「探索 (Exploration)」未來的高風險創新領域。",
m6_p2:"智邦過去十年的金牛 (Cash Cow) 是 100G/400G 的雲端白牌交換器。然而，隨著 ChatGPT 帶動的生成式 AI 狂潮，AI 資料中心的架構發生了典範轉移。AI 運算叢集需要極致低延遲、無損傳輸的 800G 甚至 1.6T 交換器，以及智慧網卡 (SmartNIC)。",
m6_p3:"面對技術的不連續性，智邦面臨抉擇。如果過度沉溺於現有產品的高毛利（過度利用），將陷入「能力陷阱 (Competency Trap)」，被新的 AI 網路架構顛覆。因此，智邦大舉投資研發 800G AI 交換器架構，並與新創生態系展開深度探索。",
m6_p4:"推動雙元轉型極為困難，因為「探索」新技術初期通常利潤微薄、良率低且高度不確定，容易被追求效率的日常營運部門排斥。智邦透過建立獨立的高階研發中心、調整 KPI，以及透過強大的高層領導力 (Contextual Ambidexterity) 來統合，確保公司在榨取現有雲端紅利的同時，成功搶下下一世代 AI 基礎設施的門票。",
m6_cards:[
  {title:"利用 (Exploitation)",desc:"智邦持續優化既有 400G 白牌交換器的良率與生產效率，鞏固現有超大型資料中心客戶的訂單，確保公司擁有穩定且龐大的自由現金流。"},
  {title:"探索 (Exploration)",desc:"投入大量高階 R&D 資源研發 800G 矽光子 (Silicon Photonics) 技術與 AI 智慧網卡。這類技術風險極高，但卻是未來五年的生死關鍵。"},
  {title:"能力陷阱 (Competency Trap)",desc:"許多成功企業因為過度優化現有產品（太會賺今天的錢），而忽視或排斥資源投入未來模糊的新技術，最終在技術典範轉移時慘遭淘汰。"},
  {title:"情境式雙元 (Contextual Ambidexterity)",desc:"不硬性切割部門，而是透過塑造鼓勵創新、容許試錯的組織文化與績效考核制度，讓員工能在日常營運中自主平衡「短期效率」與「長期創新」。"}
],
m6_terms:[
  {front:"Organizational Ambidexterity\n組織雙元性",back:"企業同時具備高效執行既有業務（利用）與敏捷適應創新變革（探索）的高階動態能力，是長青企業的核心特徵。"},
  {front:"Competency Trap\n能力陷阱",back:"企業過度專注並精進於某項帶來短期巨大成功的現有能力，反而導致組織僵化，喪失適應新環境與新技術的創新能力。"},
  {front:"Contextual Ambidexterity\n情境式雙元",back:"透過建立信任、支持與紀律兼具的組織情境（文化與制度），讓個體員工能夠自主判斷並切換探索與利用活動。"}
],
m6_q:[
  {q:"「組織雙元性」(Organizational Ambidexterity) 是指企業必須同時兼顧哪兩種截然不同的活動？",opts:["國內銷售與出口貿易","利用 (Exploitation，現有事業的效率優化) 與探索 (Exploration，未來新技術的創新研發)","硬體製造與軟體設計","增加營收與減少員工"],ans:1,exp:"長青企業必須同時當個「守成者」（擠出現金）與「開創者」（投資未來），這正是雙元性的核心挑戰。"},
  {q:"智邦若因為現有的 400G 交換器太賺錢，而拒絕投資研發風險極高的下一代 AI 矽光子技術。這種現象在策略管理中稱為？",opts:["利潤極大化","能力陷阱 (Competency Trap)","規模經濟","破壞性創新"],ans:1,exp:"過度沉溺於過去的成功能力，拒絕探索新知，短期財報好看，但在典範轉移時會瞬間失去競爭力，這就是能力陷阱。"},
  {q:"智邦將現有成熟產品所賺取的穩定現金流，大舉投入研發未來充滿不確定性的 800G AI 基礎設施技術。從 BCG 矩陣的動態資源配置邏輯來看，這是將哪種事業的資金轉移給哪種事業？",opts:["從落水狗 (Dogs) 轉移給金牛 (Cash Cows)","從金牛 (Cash Cows) 擠出資金去投資高潛力的問號 (Question Marks) / 明星 (Stars)","從明星轉移給落水狗","從問號轉移給落水狗"],ans:1,exp:"這是完美的投資組合管理：用今天成熟搖錢樹（金牛）的血汗錢，去孵化明天可能統治市場的 AI 明星技術。"},
  {q:"「情境式雙元」(Contextual Ambidexterity) 主要依賴何種機制來達成探索與利用的平衡？",opts:["完全將公司拆分成兩家獨立法人","透過嚴格的打卡制度","透過塑造支持創新、容許試錯的「組織文化與績效考核制度」，讓員工能自主切換","完全依賴外部顧問來做決定"],ans:2,exp:"情境式雙元不做硬體的部門切割，而是打造一個軟性環境，讓同一批工程師知道何時該嚴守良率紀律，何時該大膽實驗新設計。"},
  {q:"面對 AI 帶來的技術典範轉移（如 800G 與液冷散熱技術），智邦除了內部研發，也積極投資外部新創與參與開源社群。這展現了企業克服核心僵固性的哪種高階能力？",opts:["封閉式創新","動態能力 (Dynamic Capabilities)：感知外部機會並重新配置內外部資源的能力","成本領導策略","水平併購"],ans:1,exp:"Teece 提出的動態能力（感知 Sensing、捕獲 Seizing、轉型 Transforming）正是企業在劇變環境中自我重塑、打破僵化的終極武器。"}
],

m0_start:"Start Learning →",

m1_nav:"1. Disruption",m1_title:"Disruptive Innovation & Industry Disaggregation",
m1_p1:"The traditional networking industry was monopolized by giants like Cisco, offering 'Tightly Coupled' closed systems. Customers buying hardware had to buy expensive proprietary software, getting deeply 'Locked-in'. This is a classic 'Sustaining Innovation' model pursuing high gross margins.",
m1_p2:"\"When product performance overshoots what mainstream customers can absorb, it's the perfect time for Disruptive Innovation to enter.\" — Clayton Christensen",
m1_p3:"With the rise of cloud computing, Hyperscalers (Meta, Amazon, Google) needed massive, standardized network equipment. They didn't want the bloated, expensive closed systems from traditional giants. Accton keenly sensed this 'Disruptive Innovation' opportunity emerging from the low-end market and heavily pushed 'White-box switches'.",
m1_p4:"The core of the white-box model is 'Disaggregation' (decoupling hardware and software). Accton focuses on providing high-performance, standardized bare-metal hardware, allowing cloud giants to freely install open-source Network OS. This architectural innovation drastically lowered the Total Cost of Ownership (TCO) for clients, successfully overthrowing traditional networking hegemony.",
m1_cards:[
  {title:"Pain Points of Closed Architectures",desc:"A traditional Cisco switch is like an iPhone bound to iOS—hardware and software are inseparable and extremely expensive. For a data center buying tens of thousands of units, this high premium and lack of customizability is a massive burden."},
  {title:"White-box Switches",desc:"Accton's white-box switches are like buying a blank PC without an OS. Customers can freely install SDN (Software Defined Networking) software tailored to their data center needs, completely escaping vendor lock-in."},
  {title:"Trajectory of Disruptive Innovation",desc:"Early white-box switches lacked the comprehensive enterprise software features of traditional giants (initial performance inferiority). But due to their 'open, cheap, highly flexible' value proposition, they were rapidly adopted by hyperscalers and eventually conquered the mainstream market."},
  {title:"Vertical Disaggregation",desc:"The HW/SW decoupling pushed by Accton caused the networking value chain—previously vertically integrated by single vendors—to 'disaggregate', evolving into a specialized ecosystem of hardware makers and software developers."}
],
m1_terms:[
  {front:"Disaggregation",back:"Separating traditionally bundled hardware and software, allowing customers to buy standardized hardware and open-source software from different vendors, breaking closed ecosystems."},
  {front:"White-box Switches",back:"Unbranded or manufacturer-branded high-end standardized network hardware without pre-installed proprietary OS, offering massive customization flexibility and cost advantages."},
  {front:"Disruptive Innovation",back:"An innovation that enters from low-end or new markets, initially inferior in performance but cheaper/simpler, eventually improving to displace mainstream established products."}
],
m1_q:[
  {q:"What is the business model characteristic of traditional networking giants (like Cisco)?",opts:["Providing bare-metal hardware without an OS","Tightly coupled closed systems of hardware and software to earn high margins and lock in customers","Open-sourcing all R&D technology","Outsourcing all hardware and software completely"],ans:1,exp:"Traditional giants bundle hardware and software via proprietary specs. Expanding capacity forces customers to keep buying from the same brand, creating strong Lock-in effects."},
  {q:"What is the biggest attraction of Accton's 'White-box switches' to Hyperscalers?",opts:["They have the fanciest brand logos","They come with extremely expensive proprietary software licenses","They break HW/SW bundling, allowing clients to install open-source software, drastically lowering TCO and boosting flexibility","They are given away for free"],ans:2,exp:"White-box equipment allows cloud giants to buy just the hardware and load their own or open-source OS, freeing them from traditional vendor control."},
  {q:"The phenomenon of separating network equipment hardware manufacturing from OS software provision across different firms is called what in strategic management?",opts:["Vertical Integration","Vertical Disaggregation / Decoupling","Unrelated Diversification","Horizontal M&A"],ans:1,exp:"Disaggregation breaks the past model of one company handling everything vertically, moving the value chain toward specialized division of labor."},
  {q:"According to Christensen's theory, why did white-box switches gain a foothold in cloud data centers initially?",opts:["Because their enterprise software features far exceeded Cisco's","Because cloud giants needed cheaper, standardized, and highly flexible infrastructure, not the over-performing closed systems of traditional giants","Because white-box switches were the most expensive","Because government mandated it"],ans:1,exp:"Disruptive innovations often target customers who feel 'overserved' by traditional expensive systems, offering 'good enough' performance with cheaper, more flexible solutions."},
  {q:"Accton's success in the white-box market severely weakened which competitive advantage of traditional giants?",opts:["Manufacturing efficiency","Customer lock-in brought by high Switching Costs","Brand awareness","Employee benefits"],ans:1,exp:"The white-box model pushed open standards, lowering the switching costs for customers to change hardware suppliers, thoroughly dismantling the traditional vendors' lock-in advantage."}
],

m2_nav:"2. Open Networking",m2_title:"Open Networking & Business Model Innovation",
m2_p1:"Accton's success lies not just in hardware manufacturing, but in its deep understanding and embrace of the 'Open Networking' ecosystem mindset. This represents a powerful Business Model Innovation.",
m2_p2:"To break traditional hardware monopolies, Hyperscalers like Meta (Facebook) launched the OCP (Open Compute Project). OCP aims to open-source data center hardware designs, allowing anyone to use these blueprints to manufacture equipment. Accton was the world's first networking firm to contribute high-end switch designs to OCP.",
m2_p3:"'Open sourcing' hard-earned design blueprints seems counterintuitive, but from a strategic management perspective, Accton was generating massive 'Network Externalities'. Through OCP, Accton's specifications became the industry's 'Dominant Design'.",
m2_p4:"When Accton's hardware specs became the open-source standard, software developers globally started building software specifically for Accton's hardware, triggering intense 'Cross-side network effects'. Accton not only earned massive manufacturing profits but, through open standards, upgraded its business model from mere OEM to a core participant in the open networking ecosystem.",
m2_cards:[
  {title:"Business Model Innovation",desc:"Accton abandoned the traditional hardware firm habit of 'hoarding secrets', pivoting to an 'open sharing' business model. Open-sourcing lowered industry entry barriers, rapidly expanding the total market pie."},
  {title:"OCP (Open Compute Project)",desc:"An open-source hardware initiative led by Meta. Accton actively participated and contributed tech, making its hardware specs the cloud industry standard, securing Meta's trust and massive orders."},
  {title:"Establishing Dominant Design",desc:"In standard battles, the spec with the largest 'Installed Base' usually wins. Accton used OCP to proliferate its architecture, successfully cementing it as the dominant design."},
  {title:"Cross-side Network Effects",desc:"Open hardware attracted numerous SDN (Software Defined Networking) software startups; this rich software ecosystem in turn attracted more end-customers to buy Accton's hardware, creating a winner-take-all loop."}
],
m2_terms:[
  {front:"Business Model Innovation",back:"Changing how a firm creates, delivers, and captures value. Accton shifting from closed OEM to participating in an open-source hardware ecosystem is a classic example."},
  {front:"Dominant Design",back:"A product architecture that gains broad market acceptance and becomes the industry standard. Accton established its dominant design in the white-box market via OCP."},
  {front:"Open Compute Project (OCP)",back:"An initiative launched by hyperscalers to open-source data center hardware designs (servers, storage, networking), with Accton being a key driver."}
],
m2_q:[
  {q:"What was the primary strategic purpose of Accton contributing its high-end switch designs to OCP for free?",opts:["To abandon the hardware market","To drive widespread adoption of its architecture, establish the 'Dominant Design', and grow the total market","Because the designs were flawed","They were stolen by hackers"],ans:1,exp:"In markets with network effects, opening up technology rapidly expands the installed base, making your spec the industry standard, which secures massive subsequent manufacturing profits."},
  {q:"How does the 'Open Networking' ecosystem generate 'Cross-side Network Effects'?",opts:["The more closed the hardware, the more buyers","Accton's open hardware attracts open-source software developers; a rich software ecosystem in turn attracts more customers to buy Accton hardware","Faster internet makes employees happier","More government regulation means higher profits"],ans:1,exp:"Just like smartphone platforms, a positive feedback loop forms where hardware (like Android) and software developers mutually attract each other."},
  {q:"In the OCP ecosystem, what is the fundamental motive for Hyperscalers like Meta to initiate open-source hardware?",opts:["For charity","To completely break the HW/SW monopoly of traditional giants (like Cisco) and lower their own infrastructure costs","To pivot into hardware manufacturing","To increase patent lawsuits"],ans:1,exp:"Cloud giants need extremely cheap and flexible hardware. Pushing open-source allows multiple manufacturers (like Accton) to compete to supply hardware, lowering procurement costs for the giants."},
  {q:"What is the biggest difference between Accton's business model and traditional EMS providers (like Foxconn assembling iPhones)?",opts:["Accton manufactures no hardware at all","Accton possesses strong front-end architecture design capabilities, and its designs become open industry standards, rather than just passively receiving client blueprints","Accton only sells software","Accton's products are the most expensive"],ans:1,exp:"Accton is deeply involved in the 'definition and design' phase of the product, placing it much higher on the value chain than pure assembly contractors."},
  {q:"Through OCP, Accton successfully overcame which common difficulty in MNC expansion?",opts:["Capital shortage","Lack of brand awareness; through community open-sourcing, it rapidly gained the trust and recognition of top-tier global clients","Language barriers","Climate adaptation"],ans:1,exp:"In B2B markets, participating in open-source communities and contributing top-tier tech is the fastest way to build technical authority and gain hyperscaler trust."}
],

m3_nav:"3. Core Competencies & JDM",m3_title:"Core Competencies & JDM Collaboration",
m3_p1:"Taiwanese tech firms historically relied on OEM (pure assembly) or ODM (white-label design & manufacturing). However, in the white-box and cloud era, Accton developed the unique 'JDM (Joint Design Manufacturing)' model.",
m3_p2:"Hyperscaler data center architectures are extremely complex and highly confidential. They cannot buy off-the-shelf standards, nor fully outsource design. Accton's JDM model embeds its top R&D engineers to fight 'shoulder-to-shoulder' directly with architects from Meta and Amazon.",
m3_p3:"This model requires immense 'Organizational Capabilities'. Accton's core competence is not just hardware manufacturing, but 'the ability to transform a cloud client's avant-garde concepts into mass-producible, high-yield, high-end hardware in the shortest possible time'. This involves deep 'Tacit Knowledge' and cross-border teamwork.",
m3_p4:"Through JDM, Accton forms robust 'Relational Capital' with hyperscale clients. Because the design process involves massive 'Asset Specificity' (e.g., customized thermal designs and firmware integration for a specific client), high mutual dependence is created. This forms a powerful moat that competitors cannot easily penetrate.",
m3_cards:[
  {title:"From ODM to JDM",desc:"ODM is 'I design, you choose from a catalog'; JDM is 'We sit together from day one to co-design solutions for your unique pain points.' JDM creates irreplaceable customer stickiness."},
  {title:"Transformation of Tacit Knowledge",desc:"Co-developing with cloud giants, Accton accumulated vast tacit experience in advanced thermals and high-frequency signal processing—'learning-by-doing' knowledge that cannot be learned from textbooks."},
  {title:"Extreme Time-to-Market",desc:"In tech, speed is profit. Accton's JDM drastically shortens the time from Proof of Concept (POC) to Mass Production, helping clients seize market windows early."},
  {title:"Relational Capital Moat",desc:"Through multiple highly complex and successful projects, Accton built deep trust with giants. This strong 'relational contract' effectively lowers transaction costs and hold-up risks."}
],
m3_terms:[
  {front:"Joint Design Manufacturing (JDM)",back:"A deep partnership where manufacturer and client collaborate closely at the very early stages of product development to co-define specs, design, and test."},
  {front:"Tacit Knowledge",back:"Knowledge residing in engineers' brains and team chemistry that is hard to codify or write into manuals; crucial for forming core competitive advantage."},
  {front:"Relational Capital",back:"The trust and reciprocity accumulated through long-term interaction and successful cooperation between firms, effectively lowering transaction costs and facilitating deep knowledge sharing."}
],
m3_q:[
  {q:"What is the biggest difference between Accton's 'JDM' model and traditional ODM?",opts:["JDM requires absolutely no R&D","JDM emphasizes deep integration with the client's architects at the earliest stage to co-explore and define specs, rather than unilaterally offering off-the-shelf designs","ODM is more expensive","They are exactly the same"],ans:1,exp:"JDM is deep, two-way collaboration to solve the bleeding-edge technical problems, creating immense customer lock-in."},
  {q:"Co-solving high-frequency signal and thermal issues with cloud giants in JDM primarily accumulates which hard-to-imitate competitive advantage for Accton?",opts:["Massive factory buildings","Highly complex and hard-to-articulate 'Tacit Knowledge'","Massive cash reserves","Government tax credits"],ans:1,exp:"In high-end hardware design, much debugging know-how comes from trial-and-error experience. This tacit knowledge cannot be easily replicated by rivals hiring away a few people."},
  {q:"JDM creates high 'Asset Specificity' between Accton and its clients. From a TCE perspective, what risk does this usually bring, and how is it overcome?",opts:["Hold-up risk; overcome through long-term accumulated 'Relational Capital' and deep trust","Exchange rate risk; overcome by buying insurance","Technology lag risk; overcome by layoffs","No risk at all"],ans:0,exp:"Highly customized cooperation easily leads to mutual hold-up. Accton uses its stellar delivery track record to build strong trust (relational contracts), replacing rigid legal protections."},
  {q:"What is the most accurate description of Accton's 'Core Competence'?",opts:["Providing the world's cheapest labor","The organizational capability to rapidly transform highly avant-garde cloud architecture concepts into high-yield, mass-producible high-end hardware solutions","The ability to write open-source software","Owning retail stores"],ans:1,exp:"Accton's value isn't cheap manufacturing, but its formidable 'engineering and mass production capability' (extreme Time-to-Market)."},
  {q:"Why don't Hyperscalers simply build their own factories to produce switches (Vertical Integration)?",opts:["Because they hate factories","Because hardware manufacturing (supply chain mgmt, yield control) is not their core competence, and optimal scale differences are too large; outsourcing to Accton is more efficient","Because the government bans it","Because factories pollute"],ans:1,exp:"Cloud giants' core competencies are software and algorithms. Hardware manufacturing is capital intensive and highly complex; delegating it to specialists like Accton (specialization) makes the most economic sense."}
],

m4_nav:"4. Alliances & Ecosystems",m4_title:"Strategic Alliances & Ecosystems",
m4_p1:"Under the open networking architecture of HW/SW decoupling, Accton provides only bare-metal hardware. This means without a superior Network Operating System (NOS), Accton's hardware is just useless metal. Thus, 'Strategic Alliances' are the core lifeline for Accton's survival and expansion.",
m4_p2:"Accton actively forms 'Non-equity Alliances' with top-tier global software firms (like Cumulus Networks, or Microsoft-backed SONiC). This collaboration creates classic 'Complementary Synergies': Accton provides high-end hardware, partners provide agile software.",
m4_p3:"Why ally instead of acquire? Capron & Mitchell note that when needed resources are 'Modular' and market tech changes rapidly, M&A (buying) is too risky and costly. Accton's union with software firms involves clear 'Modular Synergies'; they simply connect via standard interfaces. Remaining independent actually preserves the software firms' innovative vitality.",
m4_p4:"By building broad partnerships, Accton constructed a massive 'Ecosystem' in open networking. This ecosystem not only mitigates the risk of a single technology failing (Real Options), but also offers customers the richest software choices when buying Accton hardware, further amplifying the market value of Accton's hardware.",
m4_cards:[
  {title:"Complementary Resources",desc:"Hardware and software are natural complements. Accton's hardware manufacturing combined with startups' open-source software abilities provides cloud clients with complete, powerful solutions."},
  {title:"Modular Synergies",desc:"Partners don't need to deeply alter their respective organizational structures; they just establish standard APIs. This is perfect for flexible non-equity alliance contracts, avoiding the massive integration risks of M&A."},
  {title:"Real Options",desc:"In the chaotic period before a single tech spec dominates, Accton maintains alliances with multiple OS camps. This is like buying multiple 'options'—no matter who wins eventually, Accton profits."},
  {title:"Preventing Value Leakage",desc:"If Accton attempted a hostile takeover of a software startup, it would likely trigger severe 'culture clash', causing software geniuses to quit en masse, leaving Accton with an empty shell. Alliances are the best way to protect 'soft resources'."}
],
m4_terms:[
  {front:"Strategic Alliance",back:"A cooperative agreement between independent firms sharing resources and capabilities to achieve common strategic goals. Accton widely uses this to supplement its software capabilities."},
  {front:"Modular Synergies",back:"Synergies where combining resources does not require massive modifications to underlying tech or org structures. A key reason to choose 'Alliance' over 'M&A'."},
  {front:"Ecosystem",back:"A commercial network composed of hardware makers, software developers, system integrators, and end-customers, mutually dependent and co-creating value."}
],
m4_q:[
  {q:"Accton produces only white-box hardware and must partner with NOS software providers. This demonstrates which core motive for strategic alliances?",opts:["To fire employees","To acquire highly 'Complementary Resources' to offer clients complete solutions","To monopolize market prices","To evade regulations"],ans:1,exp:"Hardware and software are perfect complements. Accton lacks pure software DNA; alliances bridge this gap at the lowest cost."},
  {q:"Why did Accton choose to form 'Strategic Alliances' with software firms rather than spending big to 'Acquire' them?",opts:["Because Accton has no money","HW/SW combination is a 'Modular Synergy' not needing deep org fusion; plus, acquiring software firms easily sparks culture clashes leading to core talent flight","Because the government bans M&A","Because M&A requires no management"],ans:1,exp:"When resources only need modular docking, 'Borrowing' (Alliance) is far more flexible and less risky than 'Buying' (M&A)."},
  {q:"In the early days of open networking before standards settled, Accton supported multiple different 3rd-party open-source OS systems. In financial and strategic management, what is this concept?",opts:["Sunk cost trap","Making multiple bets via 'Real Options' to retain future flexibility and reduce the risk of single-tech failure","Winner's curse","Perfect monopoly"],ans:1,exp:"Facing high uncertainty, allying with multiple parties is like buying multiple 'call options', ensuring the firm isn't destroyed if one tech camp collapses."},
  {q:"How does Accton's open networking ecosystem help its own hardware sales?",opts:["It lowers hardware sales","The richer the software choices in the ecosystem, the higher the 'Network Externalities Value' of Accton's hardware, making it more attractive to end-customers","It increases manufacturing costs","No help at all"],ans:1,exp:"Just as more Apps make the iPhone sell better. The more compatible open-source software exists, the exponentially higher the value of Accton's white-box hardware."},
  {q:"Accton's collaboration with software startups is usually 'Non-equity Alliances'. What is the main feature of this alliance form?",opts:["Both parties must merge completely","It is the loosest and most flexible relationship, based solely on contracts, easily adjusted or terminated as markets change","Both parties must cross-hold 50% shares","Governments strictly audit it"],ans:1,exp:"Non-equity alliances lack the heavy burden of capital lock-in, making them the best way to maintain tactical agility in the fast-changing tech industry."}
],

m5_nav:"5. Resilience & Footprint",m5_title:"Supply Chain Resilience & Global Footprint",
m5_p1:"Tech wars and geopolitics (US-China trade war, COVID-19 disruptions) have thoroughly upended global supply chain logic. In the past, networking firms pursued absolute 'Efficiency-seeking', heavily concentrating capacity in China for ultimate scale economies. Today, the risks of such over-concentration are unbearable.",
m5_p2:"Brand clients and cloud giants mandate that suppliers execute 'De-risking' and 'China Plus One' strategies. Facing client pressure, Accton must rethink its Geographical Expansion strategy.",
m5_p3:"Accton decisively adjusted its global footprint, not only massively expanding capacity at its Taiwan HQ (producing high-end 400G/800G switches to protect IP and dodge tariffs), but also aggressively building plants in Vietnam (serving mainstream products, diversifying geopolitical risks).",
m5_p4:"Through the lens of Bartlett & Ghoshal's I-R Framework (Integration-Responsiveness), Accton is being forced to shift from a cost-obsessed 'Global Strategy' to the right, increasing 'Local Responsiveness'. Establishing dispersed production bases globally inevitably sacrifices some scale economies and increases 'CAGE Distance' friction costs in cross-border management. This is the insurance premium necessary to buy 'Supply Chain Resilience'.",
m5_cards:[
  {title:"De-risking",desc:"No longer putting all eggs in one basket. While moving some capacity out of China raises initial production costs, it drastically lowers the disruption risks from single-region lockdowns or tariff sanctions."},
  {title:"CAGE Distance Challenges",desc:"Building factories in Vietnam or SE Asia forces firms to face 'Liabilities of Foreignness'—different cultural habits, language barriers, and opaque regulations. Building localized management teams is key to success."},
  {title:"Keeping High-end in Taiwan",desc:"Accton keeps its most advanced 800G AI switches and high-end R&D in Taiwan. This isn't just to dodge trade war tariffs, but to strictly protect core IP and tacit knowledge from theft."},
  {title:"Resilience vs. Efficiency Trade-off",desc:"Supply chain design is no longer just about 'lowest cost'. Modern strategy demands balancing 'extreme efficiency' with 'recovery capacity under extreme shock (resilience)'. Redundant capacity is no longer waste; it's a lifeline."}
],
m5_terms:[
  {front:"Supply Chain Resilience",back:"The ability of a supply chain to maintain operations or rapidly return to normal when facing severe external shocks (pandemics, wars, sanctions)."},
  {front:"China Plus One",back:"A strategy where MNCs, to diversify geopolitical and rising labor cost risks, mandate establishing backup capacity in other countries (like Vietnam, India) while maintaining China operations."},
  {front:"Liability of Foreignness",back:"The additional friction costs and operational risks a firm incurs when setting up overseas due to unfamiliarity with local culture, legal systems, and infrastructure."}
],
m5_q:[
  {q:"What is the primary driver behind Accton actively expanding capacity in Vietnam and Taiwan recently (the 'China Plus One' strategy)?",opts:["Pursuing more extreme economies of scale than in China","Responding to geopolitical friction and tariffs; clients demanding suppliers 'De-risk' and boost supply chain resilience","Vietnam has the best R&D in the world","To sell more switches in Vietnam"],ans:1,exp:"The US-China tech war broke the pure 'lowest cost' logic. Clients are now willing to pay a premium to ensure their supply chains aren't broken by the politics of a single country."},
  {q:"Accton keeps its highest-end 400G/800G AI switch capacity in Hsinchu/Zhubei, Taiwan. Which is NOT a primary consideration for this?",opts:["Evading high US-China trade war tariffs","Staying close to the R&D team to solve early mass production yield issues (tacit knowledge intensive)","Taiwan's labor cost is the lowest globally","Strictly protecting IP and core process secrets for high-end products"],ans:2,exp:"Taiwan's labor and land costs are relatively high. Keeping high-end products in Taiwan is for 'security, secrecy, and tight R&D-manufacturing synergy', not for chasing the lowest wages."},
  {q:"In Bartlett & Ghoshal's I-R Framework, dispersing factories across multiple countries to cope with regulations and tariff barriers represents an increase in which pressure?",opts:["Global integration pressure (extreme cost reduction)","Local Responsiveness pressure","Brand marketing pressure","Innovation R&D pressure"],ans:1,exp:"Tariffs and local manufacturing mandates from various governments force MNCs to adjust to distinct political and economic environments locally—this is the manifestation of 'Local Responsiveness'."},
  {q:"When setting up in Vietnam, Accton faced issues with local employees' reluctance to work overtime, language barriers, and low government administrative efficiency. In Ghemawat's CAGE framework, this primarily reflects friction in which two distances?",opts:["Geographic and Economic distance","Cultural distance and Administrative/Political distance","Psychic and Virtual distance","Geographic distance only"],ans:1,exp:"Employee values and language fall under 'Cultural distance'; government efficiency and regulatory transparency fall under 'Administrative/Political distance'. These are major causes of the liability of foreignness."},
  {q:"What is the most direct negative economic impact of dispersing capacity from a single mega-factory to multiple medium-sized factories in SE Asia?",opts:["Product design gets uglier","Sacrifices some 'Economies of Scale', leading to higher unit manufacturing costs","Increases marketing expenses","Employees will all quit immediately"],ans:1,exp:"Dispersing capacity means fixed costs (building plants, molds, management systems) are duplicated and cannot be amortized by massive centralized orders. This is the cost paid for 'Resilience'."}
],

m6_nav:"6. Ambidexterity in AI",m6_title:"Ambidextrous Transformation in the AI Era",
m6_p1:"In strategic management, the ultimate test for executive teams is 'Organizational Ambidexterity': a firm must simultaneously use its right hand to 'Exploit' existing core businesses for profit, and its left hand to 'Explore' future, high-risk innovation domains.",
m6_p2:"Accton's Cash Cow over the past decade has been 100G/400G cloud white-box switches. However, the generative AI frenzy driven by ChatGPT has caused a paradigm shift in AI data center architectures. AI compute clusters require ultra-low latency, lossless 800G or even 1.6T switches, and SmartNICs.",
m6_p3:"Facing technical discontinuity, Accton faces a choice. If it becomes too addicted to the high margins of its current products (over-exploitation), it will fall into a 'Competency Trap' and be disrupted by new AI network architectures. Thus, Accton is investing heavily in 800G AI switch R&D and exploring deeply with the startup ecosystem.",
m6_p4:"Pushing ambidextrous transformation is extremely difficult because 'exploring' new tech initially yields low margins, low yields, and high uncertainty, easily drawing rejection from daily operational departments focused on efficiency. Accton navigates this by establishing independent advanced R&D centers, adjusting KPIs, and using strong executive leadership (Contextual Ambidexterity) to ensure the company snags a ticket to the next-gen AI infrastructure while still milking the current cloud dividend.",
m6_cards:[
  {title:"Exploitation",desc:"Accton continues to optimize yields and production efficiency for its existing 400G white-box switches, consolidating orders from current hyperscale clients to ensure massive, stable free cash flows."},
  {title:"Exploration",desc:"Pouring massive high-end R&D resources into 800G Silicon Photonics tech and AI SmartNICs. These technologies carry extreme risk but are the life-or-death keys for the next five years."},
  {title:"Competency Trap",desc:"Many successful firms, because they over-optimize existing products (too good at making money today), ignore or reject investing in fuzzy future tech, ultimately being wiped out during paradigm shifts."},
  {title:"Contextual Ambidexterity",desc:"Instead of rigidly separating departments, this approach builds an organizational culture and KPI system that encourages innovation and tolerates trial-and-error, allowing employees to autonomously balance 'short-term efficiency' and 'long-term innovation' in their daily work."}
],
m6_terms:[
  {front:"Organizational Ambidexterity",back:"The high-level dynamic capability of a firm to simultaneously execute existing business efficiently (exploitation) and adapt agilely to innovative change (exploration)."},
  {front:"Competency Trap",back:"When a firm over-focuses on and refines an existing capability that brought massive short-term success, causing organizational rigidity and loss of ability to adapt to new tech."},
  {front:"Contextual Ambidexterity",back:"Creating a supportive, trusting, yet disciplined organizational context (culture and systems) that empowers individual employees to autonomously judge and switch between exploration and exploitation."}
],
m6_q:[
  {q:"'Organizational Ambidexterity' means a firm must simultaneously balance which two vastly different activities?",opts:["Domestic sales and export trade","Exploitation (optimizing current business efficiency) and Exploration (R&D innovation for future tech)","Hardware manufacturing and software design","Increasing revenue and cutting employees"],ans:1,exp:"Enduring firms must simultaneously be 'defenders' (milking cash) and 'pioneers' (investing in the future). This is the core challenge of ambidexterity."},
  {q:"If Accton refuses to invest in highly risky next-gen AI Silicon Photonics tech because its current 400G switches are too profitable, what is this phenomenon called in strategic management?",opts:["Profit maximization","Competency Trap","Economies of scale","Disruptive innovation"],ans:1,exp:"Over-indulging in past successful capabilities and refusing to explore new knowledge makes short-term financials look good, but instantly strips competitiveness during paradigm shifts—this is the Competency Trap."},
  {q:"Accton takes massive stable cash flows from mature products and pours them into R&D for highly uncertain 800G AI infrastructure. From the BCG matrix's dynamic resource allocation logic, what is happening?",opts:["Moving funds from Dogs to Cash Cows","Milking funds from Cash Cows to invest in high-potential Question Marks / Stars","Moving funds from Stars to Dogs","Moving funds from Question Marks to Dogs"],ans:1,exp:"This is perfect portfolio management: using the hard-earned money of today's mature cash cows to incubate the AI star technologies that might rule the market tomorrow."},
  {q:"What mechanism does 'Contextual Ambidexterity' primarily rely on to balance exploration and exploitation?",opts:["Completely splitting the company into two independent legal entities","Strict punch-card systems","Shaping an 'organizational culture and KPI system' that supports innovation and tolerates trial-and-error, allowing employees to autonomously switch modes","Relying entirely on external consultants for decisions"],ans:2,exp:"Contextual ambidexterity avoids hard structural divisions. It builds a soft environment where the same engineers know when to strictly follow yield disciplines and when to boldly experiment with new designs."},
  {q:"Facing the AI tech paradigm shift (like 800G and liquid cooling), Accton not only does internal R&D but actively invests in external startups and open-source communities. This demonstrates which high-level capability to overcome core rigidities?",opts:["Closed innovation","Dynamic Capabilities: the ability to sense external opportunities and reconfigure internal/external resources","Cost leadership strategy","Horizontal M&A"],ans:1,exp:"Dynamic Capabilities (Sensing, Seizing, Transforming), as proposed by Teece, are the ultimate weapons for firms to reinvent themselves and break rigidity in violently changing environments."}
],

const FlipCard = ({ front, back, t }) => {
  const [flipped, setFlipped] = useState(false);
  return (
    <div className="perspective cursor-pointer h-36 select-none" onClick={() => setFlipped(!flipped)}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped ? 'rotate-y-180' : ''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5] text-sm leading-snug whitespace-pre-line">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
          <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p>
        </div>
      </div>
    </div>
  );
};

/* ═══════ MODULE QUIZ ═══════ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3 text-slate-800 dark:text-slate-200">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500 font-bold'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400 text-red-600' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5 font-bold text-[#004030] dark:text-[#D8C3A5]' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    } text-slate-700 dark:text-slate-300`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => { 
            setSubmitted(true); 
            const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; 
            onQuizSubmit(moduleId, c, quizIndices.length, questions.length); 
          }}
          disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
          {t.submit}
        </button>
      ) : (
        <div className="flex items-center gap-4">
          <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</p>
          <button onClick={() => { setSelected({}); setSubmitted(false); }}
            className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/10 transition-colors">
            {t.retry}
          </button>
        </div>
      )}
    </div>
  );
};

/* ═══════ LAB COMPONENTS (ACCTON SPECIFIC) ═══════ */

// 1. Disruptive S-Curve Simulator
const DisruptiveLab = ({lang}) => {
  const [adoption, setAdoption] = useState(20);
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current; if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.offsetWidth * 2; const h = canvas.height = 240 * 2;
    ctx.scale(2,2); const cw = w/2; const ch = h/2;
    ctx.clearRect(0,0,cw,ch);
    const pad = {t:20,r:20,b:30,l:40};
    const pw = cw-pad.l-pad.r; const ph = ch-pad.t-pad.b;
    
    // Axes
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, ch-pad.b); ctx.lineTo(cw-pad.r, ch-pad.b); ctx.stroke();
    
    // Good enough line
    const geY = pad.t + ph*0.65;
    ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.strokeStyle = '#ef4444';
    ctx.moveTo(pad.l, geY); ctx.lineTo(cw-pad.r, geY); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#ef4444'; ctx.font = '10px Inter';
    ctx.fillText(lang==='zh'?"雲端客戶 '足夠好' 門檻":"Cloud 'Good Enough' Threshold", pad.l+5, geY-5);

    // Cisco (Sustaining) Line
    ctx.beginPath(); ctx.strokeStyle = '#004030'; ctx.lineWidth = 2.5;
    for(let x=0; x<=pw; x+=5) {
      const px = x/pw;
      const py = 0.3 + 0.6*(px); 
      ctx.lineTo(pad.l+x, pad.t + ph*(1-py));
    }
    ctx.stroke();
    ctx.fillStyle = '#004030'; ctx.fillText(lang==='zh'?'傳統大廠 (Cisco)':'Traditional Giant (Cisco)', cw-pad.r-120, pad.t+15);

    // Accton (Disruptive) Line
    const adv = adoption / 100;
    ctx.beginPath(); ctx.strokeStyle = '#E3B152'; ctx.lineWidth = 3;
    for(let x=0; x<=(pw*adv); x+=5) {
      const px = x/pw;
      const py = 0.1 + 0.8 * Math.pow(px, 1.8);
      ctx.lineTo(pad.l+x, pad.t + ph*(1-py));
    }
    ctx.stroke();

    // Dot
    const dotX = pad.l + (pw*adv);
    const dotY = pad.t + ph*(1 - (0.1 + 0.8 * Math.pow(adv, 1.8)));
    ctx.beginPath(); ctx.fillStyle = '#E3B152'; ctx.arc(dotX, dotY, 6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#b4862a'; ctx.fillText(lang==='zh'?'白牌交換器 (智邦)':'White-box (Accton)', Math.max(pad.l, dotX-40), dotY+15);

  }, [adoption, lang]);

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none md:col-span-2">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'白牌交換器：破壞性 S 曲線':'White-box Disruptive S-Curve'}</h4>
      <p className="text-xs text-slate-500 mb-4">{lang==='zh'?'調整白牌交換器的技術演進，觀察其越過「足夠好」門檻後對市場的顛覆。':'Adjust white-box tech evolution to observe its disruption after crossing the good-enough threshold.'}</p>
      
      <div className="flex flex-col md:flex-row gap-6 items-center">
        <canvas ref={canvasRef} className="w-full max-w-[400px] mx-auto" style={{height:'240px'}}/>
        <div className="flex-1 w-full space-y-4">
          <input type="range" min="10" max="100" value={adoption} onChange={e=>setAdoption(+e.target.value)} className="w-full accent-[#E3B152]"/>
          <div className="p-3 bg-slate-50 dark:bg-slate-900 rounded-lg text-xs text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700">
            {adoption < 45 ? 
              (lang==='zh'?'初期階段：白牌交換器性能劣於傳統大廠，僅在特定雲端利基市場被接受。':'Early Phase: White-box performance lags behind traditional giants, accepted only in cloud niches.') : 
             adoption < 75 ? 
              (lang==='zh'?'越過門檻：性能達到主流客戶需求，憑藉低 TCO 價格優勢開始大量取代傳統設備。':'Crossing Threshold: Performance meets mainstream needs. Low TCO drives massive substitution.') :
              (lang==='zh'?'全面顛覆：白牌成為市場主流標準，傳統封閉架構大廠市佔率崩跌。':'Total Disruption: White-box becomes the mainstream standard; closed-architecture giants lose share.')}
          </div>
        </div>
      </div>
    </div>
  );
};

  else if(totalValue > 70) color = 'text-yellow-600 dark:text-yellow-400';
  else color = 'text-[#004030] dark:text-[#D8C3A5]';

        </div>

          <div className="flex justify-between text-xs mb-1 text-slate-500 font-bold text-blue-600 dark:text-blue-400"><span>{lang==='zh'?'生態系網路價值':'Ecosystem Network Value'}</span><span>{swEcosystemValue}</span></div>
          <div className="bg-slate-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden"><div className="bg-blue-500 h-full transition-all" style={{width:`${(swEcosystemValue/140)*100}%`}}></div></div>
        </div>
        <div className="pt-3 border-t border-slate-200 dark:border-slate-700">
          <div className="flex justify-between text-sm font-bold text-[#004030] dark:text-[#D8C3A5] mb-1"><span>{lang==='zh'?'總體客戶價值 (TCO 優勢)':'Total Customer Value'}</span><span className={color}>{totalValue}</span></div>
          <div className="bg-slate-100 dark:bg-slate-700 h-4 rounded-full overflow-hidden"><div className="bg-[#E3B152] h-full transition-all" style={{width:`${(totalValue/140)*100}%`}}></div></div>
        </div>
      </div>
    </div>
  );
};

          <input type="range" min="10" max="100" value={geo} onChange={e=>setGeo(+e.target.value)} className="w-full accent-[#004030]"/>

        <div className="text-xs mt-1 text-slate-600 dark:text-slate-400">
          {resilienceScore >= 70 ? (lang==='zh'?'高韌性：無懼地緣政治衝擊':'High Resilience: Geopolitics-proof') : 
           resilienceScore >= 45 ? (lang==='zh'?'中等：具備基本風險緩衝':'Moderate: Basic risk buffer') : 
           (lang==='zh'?'危險：過度集中，斷鏈風險極高':'Danger: Over-concentrated, high risk')}
        </div>
      </div>
    </div>
  );
