/* ===== Security Hook ===== */
const useSecurity = () => {
  useEffect(() => {
    // 1. Domain Lock (網域白名單綁定)
    const allowedDomains = ['localhost', '127.0.0.1', '', 'lolopodcast.github.io']; // 留空字串允許本地檔案開啟
    const currentDomain = window.location.hostname;
    if (!allowedDomains.includes(currentDomain) && currentDomain !== "") {
      window.location.href = 'https://www.accton.com'; // 導向官方網站
    }

    // 2. DevTools & Context Menu Blocker
    const preventDefault = (e) => e.preventDefault();
    document.addEventListener('contextmenu', preventDefault);
    const blockKeys = (e) => {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && (e.key === 'u' || e.key === 'U')) ||
        (e.ctrlKey && (e.key === 's' || e.key === 'S')) ||
        (e.ctrlKey && (e.key === 'p' || e.key === 'P')) ||
        (e.ctrlKey && e.shiftKey && (e.key === 'i' || e.key === 'I' || e.key === 'j' || e.key === 'J' || e.key === 'c' || e.key === 'C'))
      ) {
        e.preventDefault();
      }
    };
    document.addEventListener('keydown', blockKeys);
    
    // 3. Anti-Selection/Drag
    document.addEventListener('selectstart', preventDefault);
    document.addEventListener('dragstart', preventDefault);
    document.addEventListener('copy', preventDefault);

    return () => {
      document.removeEventListener('contextmenu', preventDefault);
      document.removeEventListener('keydown', blockKeys);
      document.removeEventListener('selectstart', preventDefault);
      document.removeEventListener('dragstart', preventDefault);
      document.removeEventListener('copy', preventDefault);
    };
  }, []);
};

        { q: {en: "What initiative did Accton participate in to promote decoupled hardware solutions?", tw: "智邦科技積極參與下列哪一項計畫，以推動軟硬體解耦的開放網路解決方案？"}, options: {en: ["Closed Network Protocol", "Open Compute Project (OCP)", "Proprietary Chip Alliance", "Consumer Electronics Show"], tw: ["封閉式網路協定聯盟", "開放運算計畫 (OCP)", "專利晶片壟斷聯盟", "全球消費性電子展 (CES)"]}, ans: 1 },
        { q: {en: "What does 'L11' refer to in Accton's recent R&D investments?", tw: "智邦近期大舉投入研發的「L11」，在 AI 基礎建設中指的是什麼層級的整合？"}, options: {en: ["Layer 11 Cybersecurity", "Rack-Level Integration", "11-Nanometer Chips", "Level 11 Autonomous Driving"], tw: ["第 11 層網路資安防護", "機櫃級整合 (Rack-Level Integration)", "11 奈米晶片製造製程", "Level 11 自動駕駛技術"]}, ans: 1 }
      ]

    {
      id: 2,
      icon: IconGlobe,
      title: { en: "2. Macro Environment & Industry Value Chain (TP1)", tw: "2. 總體環境與產業價值鏈 (TP1)" },
      highlights: { 
        en: ["PESTEL: AI & Geopolitics", "China+1 & Supply Chain Resilience", "Net Zero & ESG Compliance"], 
        tw: ["PESTEL：AI 科技與地緣政治", "China+1 與全球供應鏈韌性", "淨零碳排與 ESG 法規遵循"]
      },
      description: {
        en: "A PESTEL analysis of Accton reveals two dominant forces: Technology and Politics/Legal. Technologically, the exponential demand for AI computing is driving the rapid upgrade of data centers. Technologies like 800G, 1.6T switches, and Co-Packaged Optics (CPO) are transitioning from theoretical to essential. This presents a massive opportunity for Accton, provided it can sustain heavy R&D investments to avoid technological obsolescence.\n\nPolitically, US-China tech wars and tariff barriers mandate immediate supply chain de-risking. The era of centralized production is dead. Accton is executing a complex 'China+1' strategy, dispersing its manufacturing footprint across Taiwan, Vietnam, the US, Mexico, and Southeast Asia to build critical resilience. Furthermore, stringent ESG mandates (Net Zero by 2050, 50% carbon cut by 2030) require the greening of this entire expanded supply chain.\n\nExamining the Industry Value Chain, Accton operates in the Midstream (ODM/EMS white-box manufacturing). Upstream lies the highly concentrated domain of critical chip designers (Nvidia, Broadcom), while Downstream is dominated by massive Cloud Service Providers (CSPs like Meta, AWS). The profit pool is shifting toward the extremes: upstream critical components and midstream high-value, customized integration (such as Accton's L11 rack integration). While the traditional networking market matures, the AI infrastructure sub-segment remains in explosive growth.",
        tw: "透過 PESTEL 總體環境分析，可發現驅動智邦的兩大核心力量為「科技 (Technological)」與「政治/法律 (Political/Legal)」。在科技面，全球 AI 算力需求的指數級爆發，正強力驅動資料中心的規格升級。800G、1.6T 高速交換器以及共封裝光學 (CPO) 技術已成為市場剛需。這為智邦帶來了龐大商機，但也帶來了技術迭代過快、若研發落後便可能遭邊緣化的嚴峻威脅。\n\n在政治與法律面，中美科技戰與關稅壁壘迫使全球供應鏈必須進行深度的「去風險化 (De-risking)」。智邦正全面執行「China+1」策略，將產能大舉分散至台灣竹北、越南、美國、墨西哥與星馬等地，以建構無懈可擊的供應鏈韌性。此外，嚴苛的 ESG 環保法規（如承諾 2030 減碳 50%、2050 淨零碳排）也要求智邦必須在其龐大的跨國生產基地中全面導入綠電與減碳機制。\n\n檢視其產業價值鏈，智邦位於中游的「白牌網通設備與解決方案提供」。上游是由 Nvidia、Broadcom 等晶片巨頭高度壟斷的關鍵零組件；下游則是擁有極大採購規模的超大規模雲端服務供應商 (CSPs)。產業利潤池正往「上游關鍵晶片」與「中游高階客製化整合（如智邦的 L11 機櫃級整合）」兩端集中。整體而言，雖然傳統網通市場步入成熟期，但 AI 基礎建設細分市場正處於狂飆的「高速成長期」。"
      },
      wrapUp: {
        en: "Accton must balance the rapid technological advancements in AI infrastructure with the geopolitical necessity of a fragmented, resilient global supply chain.",
        tw: "智邦必須在 AI 基礎建設狂飆的科技升級中保持領先，同時精準應對地緣政治壓力，建構出具備高度韌性且符合 ESG 規範的全球碎裂化供應鏈。"
      },
      cards: [
        { term: {en:"PESTEL Analysis", tw:"PESTEL 分析"}, def: {en:"A framework analyzing macro-environmental factors: Political, Economic, Social, Technological, Environmental, Legal.", tw:"總體環境分析架構，檢視政治、經濟、社會、科技、環境與法律等六大外部宏觀因素對企業的衝擊。"} },
        { term: {en:"CPO (Co-Packaged Optics)", tw:"CPO (共封裝光學)"}, def: {en:"An advanced technology integrating optical transceivers directly with switch ASICs to reduce latency and power consumption.", tw:"將光收發模組與交換晶片直接封裝在一起的前瞻技術，能大幅降低 AI 運算中的傳輸延遲與能耗。"} },
        { term: {en:"China+1 Strategy", tw:"China+1 策略"}, def: {en:"Diversifying supply chains away from single-country reliance to mitigate geopolitical and tariff risks.", tw:"跨國企業為規避地緣政治與貿易戰風險，將生產基地從單一國家分散至東南亞或美洲的供應鏈韌性佈局。"} },
        { term: {en:"Profit Pool", tw:"利潤池 (Profit Pool)"}, def: {en:"The total profits earned at all points along the value chain. In networking, it shifts to upstream chips and midstream custom integration.", tw:"產業價值鏈上各環節所能攫取的總利潤。網通產業的利潤池正逐漸向上游關鍵晶片與中游高階技術整合集中。"} }
      ],
      quizzes: [
        { q: {en: "Which 'PESTEL' factor primarily drives Accton's decision to build factories in the US and Mexico?", tw: "在 PESTEL 構面中，促使智邦遠赴美國與墨西哥設廠的最主要因素為何？"}, options: {en: ["Technological", "Political/Legal (Geopolitical de-risking)", "Sociocultural", "Environmental"], tw: ["科技因素 (追求最新的製造技術)", "政治/法律因素 (地緣政治避險與關稅考量)", "社會文化因素", "環境因素"]}, ans: 1 },
        { q: {en: "Where does Accton operate within the Networking Industry Value Chain?", tw: "在網通產業價值鏈中，智邦科技主要位居哪一個環節？"}, options: {en: ["Upstream (Core Chip Design)", "Midstream (Equipment Manufacturing & Integration)", "Downstream (End-Consumer Retail)", "It does not operate in this industry"], tw: ["上游 (核心網路晶片設計)", "中游 (網通設備代工製造與技術整合)", "下游 (終端個人消費者零售)", "智邦完全不屬於這個產業價值鏈"]}, ans: 1 },
        { q: {en: "What is Accton's Net Zero target year for ESG compliance?", tw: "為符合 ESG 規範，智邦承諾在西元哪一年達成「淨零碳排」的終極目標？"}, options: {en: ["2025", "2030", "2050", "2100"], tw: ["2025 年", "2030 年", "2050 年", "2100 年"]}, ans: 2 },
        { q: {en: "Why is the traditional networking market 'Mature' while Accton grows?", tw: "為何整體傳統網通市場已步入「成熟期」，智邦卻能維持爆發性成長？"}, options: {en: ["Accton sells to retail stores", "Because the specific sub-segment of 'AI Infrastructure' is in explosive growth", "Accton lowered its prices to zero", "Competitors stopped manufacturing"], tw: ["因為智邦專攻便利商店零售通路", "因為智邦專注的「AI 資料中心基礎建設」細分市場正處於爆發性成長期", "因為智邦將所有產品免費贈送", "因為全球所有的競爭對手都突然停產了"]}, ans: 1 }
      ]
    },
    {
      id: 3,
      icon: IconShield,
      title: { en: "3. Porter's Five Forces & Competition (TP1)", tw: "3. 波特五力與產業競合分析 (TP1)" },
      highlights: { 
        en: ["High Buyer Power (CSPs)", "Med-High Supplier Power (Nvidia)", "Intense Rivalry (Quanta, Wistron)"], 
        tw: ["極高買方議價力 (雲端巨頭)", "中高供應商議價力 (晶片大廠)", "激烈的現有競爭者廝殺"]
      },
      description: {
        en: "Applying Porter's Five Forces analysis reveals a highly pressurized competitive landscape for Accton.\n\nFirst, the Bargaining Power of Buyers is Extremely High. Accton's revenue is heavily concentrated among a few 'Hyperscalers' (Cloud Service Providers like Meta, AWS). These mega-clients wield immense order volumes, making them highly price-sensitive and demanding regarding extreme customization and tight delivery schedules. Accton mitigates this power by providing irreplaceable, high-value AI integration solutions.\n\nSecond, the Bargaining Power of Suppliers is Medium-to-High. The upstream supply of critical networking chips and optical components is highly concentrated (e.g., Nvidia, Broadcom). These tech giants possess monopolistic control over vital AI infrastructure components. The high switching costs and deep technical integration required mean Accton has limited negotiating room, making supply chain stability a critical vulnerability.\n\nThird, Rivalry among Existing Competitors is Medium-High. In the white-box networking and AI server space, Accton faces fierce competition from other Taiwanese heavyweights like Quanta and Wistron. While Accton holds a technological edge in 800G switching and open networking, the resource similarity among these firms is high. The competition centers on R&D speed, cost control, and the agility to execute global CapEx. Consequently, Accton's 'Position' is an aggressive attacker (investing heavily in next-gen tech) coupled with a collaborative partner (co-developing with CSPs).",
        tw: "套用波特五力分析 (Porter's Five Forces)，揭示了智邦身處一個充滿壓迫感的競合環境。\n\n首先，「買方議價能力」極高。智邦的營收高度集中於少數幾家超大規模雲端服務供應商 (Hyperscalers，如 Meta、AWS)。這些超級巨頭挾著海量的採購訂單，對報價極度敏感，並對產品的客製化深度與交期有嚴苛要求。智邦必須藉由提供不可或缺的高附加價值 AI 整合方案，才能在夾縫中緩衝買方的無情壓價。\n\n其次，「供應商議價能力」中偏高。上游關鍵的網路交換晶片與光學元件供應商高度集中（如 Nvidia、Broadcom）。這些科技巨擘在 AI 基礎設施的底層元件上具備近乎壟斷的地位。由於深度技術綁定導致的高昂轉換成本，智邦的談判籌碼受限，關鍵零組件的穩定供應成為極具風險的軟肋。\n\n第三，「現有競爭者威脅」中高。在白牌網通與 AI 伺服器代工市場，智邦面臨廣達 (Quanta)、緯創 (Wistron) 等台灣系統廠重兵集結的激烈廝殺。儘管智邦在 800G 交換器與開放網路領域具備技術領先優勢，但同業間的「資源相似性」極高。競爭焦點完全鎖定在研發速度、極致的成本控管以及全球產能佈建的執行力。為此，智邦採取了「積極攻擊（重金投資次世代技術）」與「策略合作（與 CSP 深度協同開發）」並存的競爭姿態。"
      },
      wrapUp: {
        en: "Trapped between monopolistic chip suppliers and powerful mega-buyers, Accton survives by transitioning from a mere manufacturer to an indispensable tech integration partner.",
        tw: "深陷於上游強勢晶片商與下游砍價巨頭的夾擊之中，智邦的生存之道在於從單純的代工製造廠，徹底蛻變為客戶不可或缺的高階技術整合夥伴。"
      },
      cards: [
        { term: {en:"Porter's Five Forces", tw:"波特五力分析"}, def: {en:"A strategic framework evaluating Rivalry, Buyer Power, Supplier Power, Threat of Entry, and Threat of Substitutes.", tw:"經典的產業競爭分析架構，評估：現有競爭者、買方議價力、供應商議價力、潛在進入者與替代品威脅。"} },
        { term: {en:"High Buyer Power", tw:"高買方議價能力"}, def: {en:"Occurs when mega-clients (CSPs) account for massive order volumes, allowing them to dictate terms and squeeze margins.", tw:"當營收極度仰賴少數超級巨頭 (CSPs) 時，買方能挾量砍價，強勢壓縮代工廠的毛利空間。"} },
        { term: {en:"Hyperscalers", tw:"超大規模雲端供應商"}, def: {en:"Massive cloud operators like AWS, Meta, or Google that build enormous data centers and dictate custom hardware needs.", tw:"如 AWS、Meta、Google 等擁有極大海量數據中心的雲端營運巨頭，是智邦白牌網通設備的終極大客戶。"} },
        { term: {en:"Resource Similarity", tw:"資源相似性"}, def: {en:"The degree to which competitors (like Accton, Quanta) possess comparable capabilities and capital in a specific market.", tw:"競爭對手（如智邦與廣達）在資本、製造能力與研發底蘊上的相似程度。相似度越高，競爭越趨近紅海肉搏戰。"} }
      ],
      quizzes: [
        { q: {en: "In the Five Forces framework, why is Supplier Power considered Medium-High for Accton?", tw: "在五力分析中，為何智邦面臨的「供應商議價能力」被評估為中偏高？"}, options: {en: ["Because Accton uses standard plastic parts", "Because critical networking and AI chips are monopolized by a few giants like Nvidia and Broadcom", "Because suppliers are desperate to sell", "Because there are thousands of chipmakers globally"], tw: ["因為智邦只採購最普通的塑膠外殼", "因為關鍵網路交換晶片與 AI 晶片高度集中於 Nvidia 等少數幾家巨頭手中", "因為上游供應商正面臨破產，急於賤賣庫存", "因為全球有數千家廠商都能生產高階 AI 晶片"]}, ans: 1 },
        { q: {en: "Who represents the 'High Buyer Power' in Accton's business model?", tw: "在智邦的商業模式中，誰代表了那股強大的「買方議價能力」？"}, options: {en: ["Local computer repair shops", "Hyperscalers (Cloud Service Providers like Meta)", "Individual retail consumers", "Component suppliers"], tw: ["地方型的電腦維修小商店", "超大規模雲端服務供應商 (Hyperscalers，如 Meta)", "一般終端個人消費者", "上游的基礎電子零件供應商"]}, ans: 1 },
        { q: {en: "How does Accton defend against intense rivalry from companies like Quanta and Wistron?", tw: "面對廣達、緯創等同業的激烈競爭，智邦主要透過何種策略建立防禦壁壘？"}, options: {en: ["By lowering prices to generate massive losses", "By maintaining a technological edge in 800G/1.6T and Rack-Level integration", "By switching to producing smartphones", "By refusing to sell any products"], tw: ["透過流血削價競爭，刻意製造鉅額虧損", "透過在 800G/1.6T 交換器與機櫃級整合上維持絕對的技術領先", "透過全面放棄網通，轉型生產智慧型手機", "透過拒絕向任何客戶出貨來抵制競爭"]}, ans: 1 },
        { q: {en: "What strategic posture does Accton adopt in this competitive environment?", tw: "在如此險惡的競合環境中，智邦採取了何種「競爭姿態 (Posture)」？"}, options: {en: ["Passive retreat", "Aggressive technological attacker and collaborative ecosystem partner", "Monopolistic dictator", "Government-subsidized bystander"], tw: ["消極撤退，準備退出市場", "積極的技術攻擊者（重金研發）與策略合作夥伴（協同開發）並存", "絕對壟斷的獨裁者", "完全依賴政府補貼的旁觀者"]}, ans: 1 }
      ]
    },
    {
      id: 4,
      icon: IconTarget,
      title: { en: "4. VRIN Core Competencies & Dynamics (TP2)", tw: "4. VRIN 核心能耐與動態能力 (TP2)" },
      highlights: { 
        en: ["VRIN: Custom R&D & Global Scale", "Social Complexity with CSPs", "Sensing, Seizing, Transforming"], 
        tw: ["VRIN：高階客製研發與全球製造", "與雲端巨頭的社會複雜性", "感知、掌握與重組的動態能力"]
      },
      description: {
        en: "To assess Accton's sustainable competitive advantage, we apply the VRIN framework to its two primary resources: 1. Advanced Custom R&D (Core Tech) and 2. Resilient Global Manufacturing.\n\nAre these resources 'Valuable'? Yes. They directly enabled Accton's explosive 248B NTD revenue by meeting the massive demands of AI scale-out. Are they 'Rare'? Yes. Few ODMs can execute 800G mass production while simultaneously managing global footprint shifts. Crucially, are they 'Inimitable'? Yes, due to Path Dependence and Social Complexity. Accton's 30+ year history and its incredibly deep, trust-based collaborative development cycles with top CSPs cannot be simply bought or replicated by competitors. Finally, they are 'Non-substitutable'; currently, there are no alternative manufacturing models that can deliver this level of high-speed networking customization at scale.\n\nHowever, in the AI era, static resources depreciate rapidly. Accton survives through robust Dynamic Capabilities. It excelled in 'Sensing'—identifying the limits of traditional broadband and accurately predicting the AI/HPC networking explosion. It acted decisively in 'Seizing' this opportunity by aggressively executing capital expenditures for global expansion and early 1.6T investments. Finally, it is currently 'Transforming'—overcoming organizational inertia by fundamentally reconfiguring its DNA from a 'manufacturing-centric' firm to a 'manufacturing + R&D dual-engine' technology orchestrator.",
        tw: "為了評估智邦是否具備永續的競爭優勢，我們將 VRIN 架構套用於其兩大核心能耐：1. 高階網通設備客製化研發（核心技術）與 2. 具韌性的全球化製造與供應鏈管理。\n\n這些能力「有價值 (Valuable)」嗎？絕對是。它們直接創造了智邦 2,482 億元的歷史級營收，完美承接了 AI 算力的海量需求。它們「稀少 (Rare)」嗎？是的，全球鮮少有 ODM 廠能同時精通 800G 量產並具備龐大的全球調度能力。最關鍵的是，它們「難以模仿 (Inimitable)」嗎？是的，這歸功於歷史的路徑依賴與「社會複雜性」。智邦 30 多年累積的隱性知識，以及與頂級雲端巨頭間深不可測的協同開發互信關係，是競爭對手用錢也砸不出來的護城河。最後，它們「難以替代 (Non-substitutable)」；目前市場上尚無其他模式能大規模交付如此極致客製化的高速網通設備。\n\n然而，在 AI 時代，靜態資源的折舊極快。智邦的長盛不衰端賴其強悍的「動態能力 (Dynamic Capabilities)」。在「感知 (Sensing)」上，經營層精準洞悉了傳統寬頻的極限與 AI 算力基礎設施的大爆發。在「掌握 (Seizing)」上，智邦展現驚人決斷力，火速砸下鉅資擴建全球產能並搶先投資 1.6T 規格。最後，智邦正積極進行「重組 (Transforming)」——努力克服組織慣性，從傳統「以製造為尊」的 DNA，徹底重塑為「製造+研發雙軸並進」的科技整合巨頭。"
      },
      wrapUp: {
        en: "Accton's VRIN moat is forged from decades of complex trust with CSPs, but its survival relies entirely on its dynamic capability to sense tech shifts and transform its corporate DNA.",
        tw: "智邦的 VRIN 護城河是由數十年與雲端巨頭交織的複雜信任所鑄造，但其永續霸業，完全仰賴於它能敏銳感知科技巨浪並果斷重組企業 DNA 的動態能力。"

  const [flipped, setFlipped] = useState(false);

  }, [indexKey]);

  const onClick = () => {
    setFlipped(!flipped);
    handleCardClick();
  };

  const [quizAnswers, setQuizAnswers] = useState({});
  const [cardClicks, setCardClicks] = useState(0);
  
  const SVGVisual = SVG_COMPONENTS[themeData.id] || (() => <div/>);

  useEffect(() => {
    if (themeData && themeData.cards && themeData.cards.length > 0) {
      updateCardAnalytics(themeData.id, Math.min(2, themeData.cards.length), cardClicks);
    }
  }, [themeData, cardIdx, updateCardAnalytics, cardClicks]);

  const handleNextCards = () => {
    const newIdx = Math.min(cardIdx + 2, themeData.cards.length - 2);
    setCardIdx(newIdx);
    updateCardAnalytics(themeData.id, Math.min(newIdx + 2, themeData.cards.length), cardClicks);
  };

        <div className="space-y-6 mb-5">
          {themeData.quizzes.slice(quizIdx, quizIdx + 2).map((q, localIdx) => {
            const globalIdx = quizIdx + localIdx;
            const userAns = quizAnswers[globalIdx];
            const isAnswered = userAns !== undefined;
            const isCorrect = userAns === q.ans;
            
            return (
              <div key={globalIdx} className="p-6 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-md">

                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

                    let btnClass = "p-4 rounded-lg border-2 text-left text-base font-bold transition-all duration-200 cursor-pointer ";
                    if (!isAnswered) btnClass += "hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/10 hover:border-[#004030] dark:hover:border-[#D8C3A5] border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 text-slate-700 dark:text-slate-300";
                    else if (oIdx === q.ans) btnClass += "bg-[#004030] dark:bg-[#D8C3A5] border-[#004030] dark:border-[#D8C3A5] text-white dark:text-[#004030] shadow-lg"; 
                    else if (oIdx === userAns) btnClass += "bg-red-500 border-red-600 text-white"; 
                    else btnClass += "border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 opacity-40";
                    
                    return (
                      <button key={oIdx} disabled={isAnswered} onClick={() => handleQuizSelect(globalIdx, oIdx)} className={btnClass}>
                        {opt}
                      </button>
                    );
                  })}
                </div>
                {isAnswered && (
                  <div className={`mt-4 text-base font-extrabold flex items-center gap-2 p-3 rounded-lg ${isCorrect ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400'}`}>

        </div>
      </div>

      <div className="flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
        <button onClick={() => navTo(themeData.id === 1 ? 0 : themeData.id - 1)} className="flex items-center gap-2 px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] transition-colors uppercase tracking-wider text-sm cursor-pointer">
          <IconChevronLeft size={20}/> {tUI('prevPage')}
        </button>
        <button onClick={() => navTo(themeData.id === 6 ? 7 : themeData.id + 1)} className="flex items-center gap-2 px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg font-serif font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white transition-colors uppercase tracking-wider text-sm cursor-pointer">
          {tUI('nextPage')} <IconChevronRight size={20}/>
        </button>
      </div>
    </div>
  );
};

           ) : (
             <div className={`h-full flex flex-col justify-center items-center p-4 rounded-lg font-bold text-center ${lab1Status === 1 ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400'}`}>
               <p className="mb-4">{lab1Status === 1 ? (lang === 'en' ? 'Correct! This forms a highly path-dependent Social Complexity.' : '完全正確！這種長期累積的信任具備極高的「社會複雜性」，競爭對手極難模仿。') : (lang === 'en' ? 'Incorrect. Consider Social Complexity and Path Dependence.' : '判斷錯誤，請重新思考「社會複雜性」與歷史軌跡的防禦特質。')}</p>
               <button onClick={()=>setLab1Status(0)} className="underline hover:opacity-70 cursor-pointer">{tUI('retry')}</button>

               <div>
                  <div className="flex justify-between text-xs font-bold text-slate-700 dark:text-slate-300 mb-1"><span>Cost Efficiency (量產成本效益)</span> <span>{Math.round(norm(metricCost))}</span></div>
                  <div className="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                    <div className="h-full bg-green-500 transition-all duration-300" style={{width: `${norm(metricCost)}%`}}></div>
                  </div>
               </div>
               <div>
                  <div className="flex justify-between text-xs font-bold text-slate-700 dark:text-slate-300 mb-1"><span>Geopolitical Tariff Risk (關稅制裁風險)</span> <span>{Math.round(norm(metricRisk))}</span></div>
                  <div className="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                    <div className="h-full bg-red-500 transition-all duration-300" style={{width: `${norm(metricRisk)}%`}}></div>
                  </div>
               </div>
            </div>
         </div>

       </div>

       <div className="flex justify-between items-center pt-8 mt-12 border-t border-slate-300 dark:border-slate-700">
        <button onClick={() => navTo(6)} className="flex items-center gap-2 px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] transition-colors uppercase tracking-wider text-sm cursor-pointer">
          <IconChevronLeft size={20}/> {tUI('prevPage')}
        </button>
        <button onClick={() => navTo(8)} className="flex items-center gap-2 px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg font-serif font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white transition-colors uppercase tracking-wider text-sm cursor-pointer">
          {tUI('nextPage')} <IconChevronRight size={20}/>
        </button>
      </div>
    </div>
  );
};

const AnalyticsView = ({ lang, tUI, analyticsData, navTo }) => {
  const [userData, setUserData] = useState({ group: '', id: '', name: '' });
  
  const handleExportCSV = () => {
    if(!userData.group || !userData.id || !userData.name) {
      alert(lang === 'en' ? "Please fill in all personal details." : "請完整填寫個人資料以利建檔。");
      return;
    }
    
    const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
    const filename = `Accton_StrategyReport_${userData.group}_${userData.name}_${dateStr}.csv`;
    
    let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + 
      "Module,TimeSpent(s),Interactions,CardReviewed(Viewed/Total),QuizScore(Correct/Answered/Total)\n";
    
    for (let i = 1; i <= 6; i++) {
        const d = analyticsData[i];
        csvContent += `Theme ${i},${d.time},${d.clicks},${d.cardsViewed}/${DICT.THEMES[i-1].cards.length},${d.quizCorrect}/${d.quizAnswered}/${DICT.THEMES[i-1].quizzes.length}\n`;
    }
    
    csvContent += `\nGroup,${userData.group}\nStudentID,${userData.id}\nName,${userData.name}\n`;
      
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const calculateTotal = (key) => Object.values(analyticsData).reduce((a, b) => a + b[key], 0);

  return (
    <div className="max-w-5xl mx-auto pb-12 animate-fade-in mt-4">
      <h1 className="text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6">{tUI('analytics')}</h1>
      
      <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 text-center shadow-md border border-slate-200 dark:border-slate-700">
          <div className="text-slate-500 dark:text-slate-400 text-sm font-bold mb-2">{tUI('timeSpent')}</div>
          <div className="text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{calculateTotal('time')}</div>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 text-center shadow-md border border-slate-200 dark:border-slate-700">
          <div className="text-slate-500 dark:text-slate-400 text-sm font-bold mb-2">{tUI('clicks')}</div>
          <div className="text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{calculateTotal('clicks')}</div>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 text-center shadow-md border border-slate-200 dark:border-slate-700">
          <div className="text-slate-500 dark:text-slate-400 text-sm font-bold mb-2">{tUI('cardRate')}</div>
          <div className="text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{calculateTotal('cardsViewed')}</div>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 text-center shadow-md border border-slate-200 dark:border-slate-700">
          <div className="text-slate-500 dark:text-slate-400 text-sm font-bold mb-2">{tUI('quizRate')}</div>
          <div className="text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{calculateTotal('quizCorrect')}</div>
        </div>
      </div>

      <div className="bg-white dark:bg-slate-800 rounded-xl p-8 border border-slate-200 dark:border-slate-700 shadow-xl mb-10 overflow-x-auto">
        <h3 className="font-serif font-black text-xl mb-6 text-[#004030] dark:text-[#D8C3A5]">Module Breakdown (各分頁紀錄)</h3>
        <table className="w-full text-sm text-left">
            <thead>
                <tr className="border-b-2 border-slate-200 dark:border-slate-700 text-[#004030] dark:text-[#D8C3A5]">
                    <th className="pb-3 pr-4">Theme</th>
                    <th className="pb-3 px-4">Time (s)</th>
                    <th className="pb-3 px-4">Clicks</th>
                    <th className="pb-3 px-4">Cards (View/Total)</th>
                    <th className="pb-3 pl-4">Quiz (Corr/Ans/Total)</th>
                </tr>
            </thead>
            <tbody>
                {[1, 2, 3, 4, 5, 6].map(i => {
                    const d = analyticsData[i];
                    const tData = DICT.THEMES[i-1];
                    return (
                    <tr key={i} className="border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/30">
                        <td className="py-3 pr-4 font-bold text-slate-700 dark:text-slate-300 truncate max-w-[200px]">{tData.title[lang]}</td>
                        <td className="py-3 px-4">{d.time}</td>
                        <td className="py-3 px-4">{d.clicks}</td>
                        <td className="py-3 px-4">{d.cardsViewed} / {tData.cards.length}</td>
                        <td className="py-3 pl-4">{d.quizCorrect} / {d.quizAnswered} / {tData.quizzes.length}</td>
                    </tr>
                    )
                })}
            </tbody>
        </table>
      </div>

      <div className="bg-white dark:bg-slate-800 rounded-xl p-8 border border-slate-200 dark:border-slate-700 shadow-xl">
        <h3 className="font-serif font-black text-2xl mb-6 flex items-center gap-2 text-[#004030] dark:text-[#D8C3A5]"><IconDownload /> {tUI('exportCSV')}</h3>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <input type="text" placeholder={tUI('group')} value={userData.group} onChange={e => setUserData({...userData, group: e.target.value})} className="p-3 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:border-[#004030] dark:focus:border-[#D8C3A5] outline-none font-bold"/>
          <input type="text" placeholder={tUI('studentId')} value={userData.id} onChange={e => setUserData({...userData, id: e.target.value})} className="p-3 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:border-[#004030] dark:focus:border-[#D8C3A5] outline-none font-bold"/>
          <input type="text" placeholder={tUI('name')} value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} className="p-3 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:border-[#004030] dark:focus:border-[#D8C3A5] outline-none font-bold"/>
        </div>
        <div className="flex gap-4">
           <button onClick={handleExportCSV} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white flex items-center gap-2 transition-all cursor-pointer"><IconDownload size={20}/> Export Research Data</button>
           <button onClick={() => window.location.reload()} className="px-8 py-3 rounded-lg font-bold bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors cursor-pointer">{tUI('resetData')}</button>
        </div>
      </div>

      <div className="flex justify-between items-center pt-8 mt-12 border-t border-slate-300 dark:border-slate-700">
        <button onClick={() => navTo(8)} className="flex items-center gap-2 px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] transition-colors uppercase tracking-wider text-sm cursor-pointer">
          <IconChevronLeft size={20}/> {tUI('prevPage')}
        </button>
        <button onClick={() => navTo(0)} className="flex items-center gap-2 px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg font-serif font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white transition-colors uppercase tracking-wider text-sm cursor-pointer">
          Return to Summary <IconChevronRight size={20}/>
        </button>
      </div>
    </div>
  );
};

const ResourcesView = ({ tUI, navTo }) => {
  return (
    <div className="max-w-5xl mx-auto pb-12 animate-fade-in mt-4">
       <h1 className="text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6">{tUI('externalResources')}</h1>
       <div className="p-8 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-xl flex flex-col gap-5">
          <a href="https://www.accton.com/tw/" target="_blank" rel="noreferrer" className="p-5 bg-slate-50 dark:bg-slate-900/50 rounded-lg hover:border-[#004030] dark:hover:border-[#D8C3A5] border border-slate-200 dark:border-slate-700 text-[#004030] dark:text-[#D8C3A5] font-bold flex items-center justify-between transition-all shadow-sm">
            <span>Accton Technology (智邦科技) Official Portal</span> <IconGlobe size={22}/>
          </a>
          <a href="https://www.opencompute.org/" target="_blank" rel="noreferrer" className="p-5 bg-slate-50 dark:bg-slate-900/50 rounded-lg hover:border-[#004030] dark:hover:border-[#D8C3A5] border border-slate-200 dark:border-slate-700 text-[#004030] dark:text-[#D8C3A5] font-bold flex items-center justify-between transition-all shadow-sm">
            <span>Open Compute Project (OCP 開放運算計畫)</span> <IconGlobe size={22}/>
          </a>
          <a href="https://hbr.org/1979/03/how-competitive-forces-shape-strategy" target="_blank" rel="noreferrer" className="p-5 bg-slate-50 dark:bg-slate-900/50 rounded-lg hover:border-[#004030] dark:hover:border-[#D8C3A5] border border-slate-200 dark:border-slate-700 text-[#004030] dark:text-[#D8C3A5] font-bold flex items-center justify-between transition-all shadow-sm">
            <span>Harvard Business Review: Porter's Five Forces (HBR 波特五力分析)</span> <IconGlobe size={22}/>
          </a>
          <a href="https://www.weforum.org/agenda/macroeconomics/" target="_blank" rel="noreferrer" className="p-5 bg-slate-50 dark:bg-slate-900/50 rounded-lg hover:border-[#004030] dark:hover:border-[#D8C3A5] border border-slate-200 dark:border-slate-700 text-[#004030] dark:text-[#D8C3A5] font-bold flex items-center justify-between transition-all shadow-sm">
            <span>World Economic Forum: Macro Environment (世界經濟論壇總體經濟)</span> <IconGlobe size={22}/>
          </a>
       </div>

       <div className="flex justify-between items-center pt-8 mt-12 border-t border-slate-300 dark:border-slate-700">
        <button onClick={() => navTo(7)} className="flex items-center gap-2 px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] transition-colors uppercase tracking-wider text-sm cursor-pointer">
          <IconChevronLeft size={20}/> {tUI('prevPage')}
        </button>
        <button onClick={() => navTo(9)} className="flex items-center gap-2 px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg font-serif font-bold shadow-md hover:bg-[#002b20] dark:hover:bg-white transition-colors uppercase tracking-wider text-sm cursor-pointer">
          {tUI('nextPage')} <IconChevronRight size={20}/>
        </button>
      </div>
    </div>
  );
};

/* ===== MAIN APP COMPONENT ===== */
function App() {
  useSecurity(); 
  
  const [lang, setLang] = useState('en'); 
  const [isDark, setIsDark] = useState(true); // 預設深色
  const [currentPage, setCurrentPage] = useState(0); 
  const [menuOpen, setMenuOpen] = useState(false);
  const [speechSynthesisActive, setSpeechSynthesisActive] = useState(false);
  
  // Analytics State - Tracked per module (10 modules: 0-9)
  const [analyticsData, setAnalyticsData] = useState(() => {
    let initial = {};
    for (let i = 0; i <= 9; i++) {
        initial[i] = { time: 0, clicks: 0, cardsViewed: 0, quizCorrect: 0, quizAnswered: 0 };
    }
    return initial;
  });

  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
  }, [isDark]);

  useEffect(() => {
    const timer = setInterval(() => {
        setAnalyticsData(prev => ({
            ...prev,
            [currentPage]: { ...prev[currentPage], time: prev[currentPage].time + 1 }
        }));
    }, 1000);
    return () => clearInterval(timer);
  }, [currentPage]);

  const handleGlobalClick = useCallback(() => {
    setAnalyticsData(prev => ({
        ...prev,
        [currentPage]: { ...prev[currentPage], clicks: prev[currentPage].clicks + 1 }
    }));
  }, [currentPage]);

  const t = useCallback((keyDict) => keyDict[lang], [lang]);
  const tUI = useCallback((key) => DICT.UI[key][lang], [lang]);

  const speakText = useCallback((text = null) => {
    const synth = window.speechSynthesis;
    if (!synth) return;
    synth.cancel();
    
    let contentToRead = text;
    if (!contentToRead) {
        if (currentPage === 0) {
            contentToRead = `${DICT.OVERVIEW.title[lang]}. ${DICT.OVERVIEW.content[lang]}`;
        } else if (currentPage >= 1 && currentPage <= 6) {
            const th = DICT.THEMES[currentPage-1];
            contentToRead = `${th.title[lang]}. ${DICT.UI.highlights[lang]}: ${th.highlights[lang].join(", ")}. ${DICT.UI.description[lang]}: ${th.description[lang]}. ${DICT.UI.wrapUp[lang]}: ${th.wrapUp[lang]}.`;
        } else {
            contentToRead = lang === 'en' ? "Please navigate to a theory section to use full page reading." : "請導航至理論章節以使用全頁語音導覽功能。";
        }
    }

    const utterance = new SpeechSynthesisUtterance(contentToRead);
    utterance.lang = lang === 'en' ? 'en-GB' : 'zh-TW';
    utterance.rate = 1.0;
    
    const voices = synth.getVoices();
    if (lang === 'en') {
      const enVoice = voices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('male'));
      if(enVoice) utterance.voice = enVoice;
    } else {
      const twVoice = voices.find(v => v.lang === 'zh-TW' && (v.name.toLowerCase().includes('yating') || v.name.toLowerCase().includes('female')));
      if(twVoice) utterance.voice = twVoice;
    }
    
    utterance.onstart = () => setSpeechSynthesisActive(true);
    utterance.onend = () => setSpeechSynthesisActive(false);
    utterance.onerror = () => setSpeechSynthesisActive(false);
    synth.speak(utterance);
  }, [lang, currentPage]);
  
  const stopSpeak = useCallback(() => {
    const synth = window.speechSynthesis;
    if(synth) { 
      synth.cancel(); 
      setSpeechSynthesisActive(false); 
    }
  }, []);

  const updateCardAnalytics = useCallback((themeId, viewed, clicks) => {
    setAnalyticsData(prev => ({
        ...prev,
        [themeId]: { 
            ...prev[themeId], 
            cardsViewed: Math.max(prev[themeId].cardsViewed, viewed),
            clicks: prev[themeId].clicks + (clicks ? 1 : 0)
        }
    }));
  }, []);

  const updateQuizAnalytics = useCallback((themeId, correct, answered) => {
    setAnalyticsData(prev => ({
        ...prev,
        [themeId]: { 
            ...prev[themeId], 
            quizCorrect: Math.max(prev[themeId].quizCorrect, correct),
            quizAnswered: Math.max(prev[themeId].quizAnswered, answered)
        }
    }));
  }, []);

  const navTo = useCallback((pageIdx) => {
    stopSpeak();
    setCurrentPage(pageIdx);
    setMenuOpen(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [stopSpeak]);

  const renderPage = () => {
    if (currentPage === 0) {
      return <OverviewView t={t} tUI={tUI} navTo={navTo} lang={lang} />;
    }
    if (currentPage >= 1 && currentPage <= 6) {
      return <ThemeContentView key={currentPage} themeData={DICT.THEMES[currentPage-1]} t={t} tUI={tUI} lang={lang} navTo={navTo} updateCardAnalytics={updateCardAnalytics} updateQuizAnalytics={updateQuizAnalytics} />;
    }
    if (currentPage === 7) return <InteractiveLabView lang={lang} tUI={tUI} navTo={navTo} />;
    if (currentPage === 8) return <ResourcesView tUI={tUI} navTo={navTo} />;
    if (currentPage === 9) return <AnalyticsView lang={lang} tUI={tUI} analyticsData={analyticsData} navTo={navTo} />;
    return <OverviewView t={t} tUI={tUI} navTo={navTo} lang={lang} />;
  };

  return (
    <div className="flex flex-col min-h-screen" onClick={handleGlobalClick}>
      <TopHeader menuOpen={menuOpen} setMenuOpen={setMenuOpen} navTo={navTo} tUI={tUI} speakText={speakText} stopSpeak={stopSpeak} speechSynthesisActive={speechSynthesisActive} lang={lang} setLang={setLang} isDark={isDark} setIsDark={setIsDark} />
      <DrawerMenu menuOpen={menuOpen} navTo={navTo} tUI={tUI} t={t} currentPage={currentPage} />
      
      {menuOpen && <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 transition-opacity" onClick={() => setMenuOpen(false)}></div>}
      
      <main className="flex-1 pt-16 pb-16 px-4 transition-colors duration-300">
        {renderPage()}
      </main>

      <FooterBlock />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
