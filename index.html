/* ═══════ APP ═══════ */
function App() {
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(false);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  
  // Total 10 pages: 0(Overview), 1-6(Modules), 7(Resources), 8(Lab), 9(Analytics)
  const [analytics, setAnalytics] = useState({
    time: Array(10).fill(0), clicks: Array(10).fill(0),
    quizCorrect: Array(10).fill(0), quizTotal: Array(10).fill(0), quizAnswered: Array(10).fill(0)
  });
  const menuRef = useRef(null);
  const t = dict[lang];

  const modulesList = [
    {id:0,icon:"📋",title:t.m0_nav,comp:<IconBookOpen size={16}/>},
    {id:1,icon:"⚡",title:t.m1_nav,comp:<IconZapLab size={16}/>},
    {id:2,icon:"🌐",title:t.m2_nav,comp:<IconGlobe size={16}/>},
    {id:3,icon:"🛠️",title:t.m3_nav,comp:<IconActivity size={16}/>},
    {id:4,icon:"🤝",title:t.m4_nav,comp:<IconLink size={16}/>},
    {id:5,icon:"🛡️",title:t.m5_nav,comp:<IconShield size={16}/>},
    {id:6,icon:"🧠",title:t.m6_nav,comp:<IconCpu size={16}/>},
    {id:7,icon:"🔗",title:t.m7_nav||(lang==='zh'?'7. 外部資源':'7. Resources'),comp:<IconGlobe size={16}/>},
    {id:8,icon:"🧪",title:t.mlab_nav||(lang==='zh'?'8. 互動實驗室':'8. Lab'),comp:<IconZapLab size={16}/>},
    {id:9,icon:"📊",title:lang==='zh'?'9. 學習分析':'9. Analytics',comp:<IconActivity size={16}/>}
  ];

  // Dark mode
  useEffect(()=>{ document.documentElement.classList.toggle('dark', isDark); },[isDark]);

  // Timer
  useEffect(()=>{
    const iv = setInterval(()=>{
      setAnalytics(a=>{ const nt=[...a.time]; nt[module]++; return {...a,time:nt}; });
    },1000);
    return ()=>clearInterval(iv);
  },[module]);

  // Click tracker
  const handleContentClick = () => {
    setAnalytics(a=>{ const nc=[...a.clicks]; nc[module]++; return {...a,clicks:nc}; });
  };

  // Quiz submit
  const handleQuizSubmit = (mid, correct, answeredCount, totalPool) => {
    setAnalytics(a=>{
      const qc=[...a.quizCorrect]; qc[mid]=correct;
      const qt=[...a.quizTotal]; qt[mid]=totalPool;
      const qa=[...a.quizAnswered]; qa[mid]=answeredCount;
      return {...a,quizCorrect:qc,quizTotal:qt,quizAnswered:qa};
    });
  };

  // Module switch
  const switchModule = (m) => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    setTtsState('idle');
    setModule(m);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  // Close menu on outside click
  useEffect(()=>{
    if(!menuOpen)return;
    const handler=(e)=>{ if(menuRef.current&&!menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[menuOpen]);

  // TTS
  const handleTTS = (action) => {
    if(!('speechSynthesis' in window))return;
    if(action==='stop'){window.speechSynthesis.cancel();setTtsState('idle');return;}
    if(action==='pause'){window.speechSynthesis.pause();setTtsState('paused');return;}
    if(action==='play'){
      if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return;}
      window.speechSynthesis.cancel();
      const sep = lang==='zh'?'。 ':'. ';
      let texts=[];
      if(module===0){
        texts=[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);
      } else if(module>=1&&module<=6){
        const mk=`m${module}`;
        texts=[t[`${mk}_title`],...[1,2,3,4].map(n=>t[`${mk}_p${n}`]).filter(Boolean),...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`),...(t[`${mk}_terms`]||[]).flatMap(tr=>[tr.front.replace('\n',' '),tr.back])].filter(Boolean);
      } else if(module===7){
        texts=[t.m7_title||t.m6_title,t.m7_desc||t.m6_desc].filter(Boolean);
      } else if(module===8){
        texts=[t.mlab_title,t.mlab_desc].filter(Boolean);
      } else {
        texts=[t.analytics_title,t.analytics_desc].filter(Boolean);
      }
      const text=texts.join(sep);
      const utterance=new SpeechSynthesisUtterance(text);
      utterance.rate=0.95;
      const voices=window.speechSynthesis.getVoices();
      if(lang==='zh'){
        const v=voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if(v)utterance.voice=v; utterance.lang='zh-TW';
      } else {
        const v=voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if(v)utterance.voice=v; utterance.lang='en-GB';
      }
      utterance.onend=()=>setTtsState('idle');
      utterance.onerror=()=>setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  // CSV export with DOMPurify
  const exportCSV = () => {
    const safeGroup = window.DOMPurify.sanitize(studentInfo.group);
    const safeDept = window.DOMPurify.sanitize(studentInfo.dept);
    const safeId = window.DOMPurify.sanitize(studentInfo.id);
    const safeName = window.DOMPurify.sanitize(studentInfo.name);

    const BOM='\uFEFF';
    const header='Group,Dept,ID,Name,Module,TimeSpent(sec),Clicks,QuizCorrect,QuizAnswered,QuizTotal\n';
    let rows='';
    modulesList.forEach((m)=>{
      const mid = m.id;
      rows+=`${safeGroup},${safeDept},${safeId},${safeName},${m.title},${analytics.time[mid]},${analytics.clicks[mid]},${analytics.quizCorrect[mid]},${analytics.quizAnswered[mid]},${analytics.quizTotal[mid]}\n`;
    });
    
    // 依據規範產生檔名：品牌_主標題_組別_學號_姓名_日期
    const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
    const safeTitle = t.title.replace(/ /g, '_');
    const filename = `Accton_${safeTitle}_${safeGroup}_${safeId}_${safeName}_${dateStr}.csv`;

    const blob=new Blob([BOM+header+rows],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Navigation bounds
  const currentIdx = modulesList.findIndex(m => m.id === module);
  const prevId = currentIdx > 0 ? modulesList[currentIdx - 1].id : module;
  const nextId = currentIdx < modulesList.length - 1 ? modulesList[currentIdx + 1].id : module;

  // Render learning module
  const renderLearning = (num) => {
    const mk=`m${num}`;
    return (
      <div className="space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
        <H2 icon={modulesList.find(m=>m.id===num)?.icon} number={num}>{t[`${mk}_title`]}</H2>
        <p>{t[`${mk}_p1`]}</p>
        {t[`${mk}_p2`] && <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-base">{t[`${mk}_p2`]}</p>}
        {t[`${mk}_p3`] && <p>{t[`${mk}_p3`]}</p>}
        {t[`${mk}_p4`] && <p>{t[`${mk}_p4`]}</p>}
        {t[`${mk}_cards`] && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {t[`${mk}_cards`].map((c,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-2">{c.title}</h4>
                <p className="text-sm text-slate-600 dark:text-slate-400">{c.desc}</p>
              </div>
            ))}
          </div>
        )}
        <div className="mt-8 select-none">
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
          <div key={`terms-${module}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {t[`${mk}_terms`].map((term,i)=><FlipCard key={i} front={term.front} back={term.back} t={t}/>)}
          </div>
        </div>
        <ModuleQuiz key={`quiz-${module}`} questions={t[`${mk}_q`]} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit}/>
      </div>
    );
  };

  // Render Resources
  const renderResources = () => {
    const links = [
      {label:lang==='zh'?'天下雜誌：智邦如何成為白牌網通霸主':'How Accton became the white-box king',url:'https://www.cw.com.tw/',desc:lang==='zh'?'深度報導智邦科技擁抱開放網路的轉型歷程。':'In-depth report on Accton\'s transformation to open networking.'},
      {label:lang==='zh'?'OCP 官方網站':'Open Compute Project (OCP)',url:'https://www.opencompute.org/',desc:lang==='zh'?'了解 Meta 等巨頭推動的開源硬體生態系。':'Explore the open-source hardware ecosystem driven by Meta.'},
      {label:lang==='zh'?'Christensen: 破壞性創新理論':'Disruptive Innovation (HBR)',url:'https://hbr.org/2015/12/what-is-disruptive-innovation',desc:lang==='zh'?'解析白牌交換器如何從低階市場顛覆 Cisco 的基礎理論。':'The theory behind how white-box disrupted Cisco from the low-end.'}
    ];
    return (
      <div className="space-y-10 animate-fade-in select-none">
        <H2 icon="🔗" number={7}>{t.m7_title||t.m6_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.m7_desc||t.m6_desc}</p>
        <div className="grid md:grid-cols-2 gap-3">{links.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
        <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'以上連結為外部資源，內容可能隨時變更。請自行確認資訊的時效性與正確性。':'Links are external resources that may change. Please verify timeliness and accuracy independently.'}</p>
        </div>
      </div>
    );
  };

  // Render Lab
  const renderLab = () => (
    <div className="space-y-8 animate-fade-in select-none">
      <H2 icon="🧪" number={8}>{t.mlab_title}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <DisruptiveLab lang={lang}/>
      <div className="grid md:grid-cols-2 gap-6">
        <EcosystemLab lang={lang}/>
        <ResilienceLab lang={lang}/>
      </div>
    </div>
  );

  // Render Analytics
  const renderAnalytics = () => {
    const totalTime = analytics.time.reduce((s,v)=>s+v,0);
    const totalClicks = analytics.clicks.reduce((s,v)=>s+v,0);
    const totalCorrect = analytics.quizCorrect.reduce((s,v)=>s+v,0);
    const totalAnswered = analytics.quizAnswered.reduce((s,v)=>s+v,0);
    const overallAcc = totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0;
    const canExport = studentInfo.group&&studentInfo.dept&&studentInfo.id&&studentInfo.name;
    return (
      <div className="space-y-8 animate-fade-in select-none">
        <H2 icon="📊" number={9}>{t.analytics_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalTime}{t.analytics_sec}</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_total_time}</div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalClicks}{t.analytics_times}</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_total_clicks}</div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{overallAcc}%</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_overall_acc}</div>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-[#004030] text-white">
                <th className="px-3 py-2 text-left">{t.analytics_module}</th>
                <th className="px-3 py-2 text-center">{t.analytics_time}</th>
                <th className="px-3 py-2 text-center">{t.analytics_clicks}</th>
                <th className="px-3 py-2 text-center">{t.analytics_correct_ans_total}</th>
              </tr>
            </thead>
            <tbody>
              {modulesList.map((m)=>{
                const mid = m.id;
                return (
                  <tr key={mid} className="border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                    <td className="px-3 py-2 font-medium text-slate-700 dark:text-slate-300">{m.title}</td>
                    <td className="px-3 py-2 text-center">{analytics.time[mid]}{t.analytics_sec}</td>
                    <td className="px-3 py-2 text-center">{analytics.clicks[mid]}{t.analytics_times}</td>
                    <td className="px-3 py-2 text-center">{analytics.quizTotal[mid]>0?`${analytics.quizCorrect[mid]} / ${analytics.quizAnswered[mid]} / ${analytics.quizTotal[mid]}`:t.analytics_no_data}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
          <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_group}</label>
              <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300">
                <option value="">--</option>
                {t.group_options.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_dept}</label>
              <input placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_id}</label>
              <input placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_name}</label>
              <input placeholder={t.analytics_name_ph} value={studentInfo.name} onChange={e=>setStudentInfo(s=>({...s,name:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
          </div>
          <div className="mt-4">
            <button onClick={exportCSV} disabled={!canExport} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-colors">
              {canExport?t.analytics_export_csv:t.analytics_fill_required}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // Render content
  const renderContent = () => {
    switch(module){
      case 0: return (
        <div className="space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
          <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white select-none">
            <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
            <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
            <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm select-none">
            <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
            <p className="text-base text-slate-600 dark:text-slate-400">{t.m0_why_desc}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 select-none">
            {t.m0_stats.map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
                <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
              </div>
            ))}
          </div>
          <div className="select-none">
            <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
            <div className="space-y-3">
              {t.m0_modules.map((m,i)=>(
                <button key={i} onClick={()=>switchModule(modulesList[i+1].id)}
                  className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                  <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div>
                    <div className="text-sm text-slate-500 dark:text-slate-400">{m.desc}</div>
                  </div>
                  <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0 transition-colors"/>
                </button>
              ))}
            </div>
          </div>
          <div className="flex justify-end select-none">
            <button onClick={()=>switchModule(modulesList[1].id)}
              className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white uppercase text-sm tracking-wider shadow-md rounded-lg transition-all">
              {t.m0_start}
            </button>
          </div>
        </div>
      );
      case 1: case 2: case 3: case 4: case 5: case 6: return renderLearning(module);
      case 7: return renderResources();
      case 8: return renderLab();
      case 9: return renderAnalytics();
      default: return null;
    }
  };

  return (
    <div className={`min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]`}>
      {/* HEADER */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30 select-none">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2">
            {/* Hamburger */}
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Toggle menu">
                {menuOpen ? <IconX size={20}/> : <IconMenu size={20}/>}
              </button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
                  </div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{switchModule(m.id);setMenuOpen(false);}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left
                        ${module===m.id
                          ?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold'
                          :'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            {/* Brand */}
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 text-white hover:text-[#D8C3A5] transition-colors">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="font-serif font-bold text-white text-sm hidden sm:inline truncate max-w-[200px]">{t.title}</span>
            </button>
          </div>
          {/* Controls */}
          <div className="flex items-center gap-1 sm:gap-2">
            <div className="flex items-center gap-1 mr-1 sm:mr-2">
              {ttsState==='idle' && <button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={16}/></button>}
              {ttsState==='playing' && <>
                <button onClick={()=>handleTTS('pause')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPause size={16}/></button>
                <button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>
              </>}
              {ttsState==='paused' && <>
                <button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPlay size={16}/></button>
                <button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>
              </>}
            </div>
            <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} className="px-2 py-1 text-xs sm:text-sm font-bold border border-[#D8C3A5]/50 rounded-lg hover:bg-white/10 transition-colors">
              {lang==='zh'?'EN':'中'}
            </button>
            <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">
              {isDark?<IconSun size={18}/>:<IconMoon size={18}/>}
            </button>
          </div>
        </div>
      </header>

      {/* BODY */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        {/* Sidebar */}
        <aside className="hidden md:block w-64 shrink-0 select-none">
          <div className="sticky top-20 space-y-1">
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>switchModule(m.id)}
                className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-left
                  ${module===m.id
                    ?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-sm'
                    :'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-[#004030] dark:hover:text-[#D8C3A5]'}`}>
                <span className={module===m.id?'text-[#D8C3A5]':'opacity-60'}>{m.icon}</span>
                <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 min-w-0" onClick={handleContentClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
          </div>
          {/* Bottom nav */}
          <div className="mt-6 flex justify-between items-center pt-6 border-t border-slate-300 dark:border-slate-700 select-none">
            <button onClick={()=>switchModule(prevId)} disabled={currentIdx === 0}
              className="px-4 sm:px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center transition-colors">
              ← {t.nav_prev}
            </button>
            <button onClick={()=>switchModule(nextId)} disabled={currentIdx === modulesList.length - 1}
              className="px-6 sm:px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center rounded-lg transition-all">
              {t.nav_next} <IconArrowRight size={16} className="ml-2"/>
            </button>
          </div>
        </main>
      </div>

      {/* FOOTER */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0 select-none">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">Version 2026.04.12 · For Educational Use Only</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3 shrink-0">
          <span className="flex items-center gap-1 hidden sm:flex">
            Architect:&nbsp;
            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo"
              target="_blank" rel="noopener noreferrer"
              className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">
              Prof. Shihmin Lo
            </a>
          </span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
            className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer border-l border-slate-600 pl-3">
            Top ↑
          </button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
